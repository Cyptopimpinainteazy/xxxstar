<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAINBENCH PRO // RPC Report</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --panel: #0b1520;
    --panel-2: #09111a;
    --border: #14304a;
    --accent: #00e5ff;
    --accent-2: #a8ff3e;
    --warn: #ffbb00;
    --text: #d3eef7;
    --muted: #62859a;
    --display: 'Bebas Neue', sans-serif;
    --mono: 'Share Tech Mono', monospace;
    --body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: var(--body);
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(0, 229, 255, 0.12), transparent 35%),
      linear-gradient(180deg, #04070b, var(--bg));
  }
  .bench-shell { max-width: 1280px; margin: 0 auto; padding: 28px; }
  .hero {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    padding: 24px;
    border: 1px solid var(--border);
    background: rgba(9, 17, 26, 0.92);
  }
  .hero-kicker, .table-key, .table-val, .feed-row, .feed-type, .feed-hash {
    font-family: var(--mono);
  }
  .hero-kicker { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  .hero h1 { font-family: var(--display); font-size: 44px; letter-spacing: 4px; }
  .hero p { color: var(--muted); max-width: 620px; line-height: 1.7; }
  .hero-side { min-width: 280px; display: grid; gap: 10px; align-content: start; }
  .status-pill, .source-pill {
    padding: 10px 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    font-family: var(--mono);
    font-size: 11px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-top: 18px;
  }
  .card, .table-panel, .feed-panel {
    border: 1px solid var(--border);
    background: var(--panel);
  }
  .card { padding: 18px; }
  .card-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card-value {
    font-family: var(--display);
    font-size: 36px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1.1fr 1.1fr 1fr;
    gap: 14px;
    margin-top: 18px;
  }
  .table-panel h2, .feed-panel h2 {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 2px;
  }
  table { width: 100%; border-collapse: collapse; }
  td {
    padding: 11px 16px;
    border-bottom: 1px solid rgba(20, 48, 74, 0.65);
    vertical-align: top;
  }
  .table-key { font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; width: 40%; }
  .table-val { font-size: 11px; color: var(--text); }
  .feed-panel { display: flex; flex-direction: column; }
  .feed-body { padding: 10px 14px; display: grid; gap: 8px; }
  .feed-row {
    display: grid;
    gap: 4px;
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid rgba(20, 48, 74, 0.55);
    font-size: 10px;
  }
  .feed-type { color: var(--accent-2); letter-spacing: 1px; }
  .feed-detail { color: var(--text); }
  .feed-hash { color: var(--muted); word-break: break-all; }
  @media (max-width: 980px) {
    .cards, .grid { grid-template-columns: 1fr 1fr; }
    .hero { flex-direction: column; }
  }
  @media (max-width: 640px) {
    .bench-shell { padding: 16px; }
    .cards, .grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 34px; }
  }
</style>
</head>
<body>
  <main class="bench-shell">
    <section class="hero">
      <div>
        <div class="hero-kicker">Read-only benchmark console</div>
        <h1 id="bench-title">Chainbench RPC Report</h1>
        <p id="bench-kicker">Read-only benchmark console sourced from saved reports.</p>
      </div>
      <div class="hero-side">
        <div class="status-pill" id="bench-status">LOADING</div>
        <div class="status-pill" id="bench-updated">Updated ...</div>
        <div class="source-pill" id="bench-source">artifact source</div>
      </div>
    </section>

    <section class="cards">
      <article class="card"><div class="card-label" id="bench-card-1-label">Metric</div><div class="card-value" id="bench-card-1-value">...</div></article>
      <article class="card"><div class="card-label" id="bench-card-2-label">Metric</div><div class="card-value" id="bench-card-2-value">...</div></article>
      <article class="card"><div class="card-label" id="bench-card-3-label">Metric</div><div class="card-value" id="bench-card-3-value">...</div></article>
      <article class="card"><div class="card-label" id="bench-card-4-label">Metric</div><div class="card-value" id="bench-card-4-value">...</div></article>
    </section>

    <section class="grid">
      <article class="table-panel">
        <h2>Live Snapshot</h2>
        <table><tbody id="bench-summary"></tbody></table>
      </article>
      <article class="table-panel">
        <h2>Artifact Summary</h2>
        <table><tbody id="bench-artifacts"></tbody></table>
      </article>
      <article class="table-panel">
        <h2>Detail Rows</h2>
        <table><tbody id="bench-details"></tbody></table>
      </article>
    </section>

    <section class="feed-panel" style="margin-top: 18px;">
      <h2>Recent Network Feed</h2>
      <div class="feed-body" id="bench-feed"></div>
    </section>
  </main>

  <script src="js/x3-data-api.js"></script>
  <script src="js/x3-page-adapters.js"></script>
  <script>
  X3PageAdapters.start();
  </script>
</body>
</html>
