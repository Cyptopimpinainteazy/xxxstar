[package]
name = "errno"
version = "0.3.14"
authors = ["Dan Gohman <dev@sunfishcode.online>"]
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Cross-platform interface to the POSIX errno variable"
documentation = "https://docs.rs/errno"
repository = "https://github.com/lambda-fairy/rust-errno"
keywords = ["errno", "libc", "posix"]
categories = ["os", "api-bindings"]

[features]
default = ["std"]
std = []

[dependencies]
libc = { version = "0.2.95", default-features = false, optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
libc = { version = "0.2.95", default-features = false }

[target.'cfg(target_arch = "wasm32")'.dependencies]
# No dependencies for WASM targets