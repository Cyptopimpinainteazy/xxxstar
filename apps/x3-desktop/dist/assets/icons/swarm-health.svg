<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Swarm Health: GPU grid with heartbeat -->
  <rect x="6" y="14" width="52" height="36" rx="4" stroke="#ff6b35" stroke-width="2.5"/>
  <rect x="12" y="20" width="16" height="10" rx="2" fill="#ff6b35" opacity="0.3"/>
  <rect x="36" y="20" width="16" height="10" rx="2" fill="#ff6b35" opacity="0.2"/>
  <rect x="12" y="34" width="16" height="10" rx="2" fill="#ff6b35" opacity="0.2"/>
  <rect x="36" y="34" width="16" height="10" rx="2" fill="#ff6b35" opacity="0.15"/>
  <!-- Heartbeat line -->
  <polyline points="4,56 16,56 20,48 24,60 28,52 32,56 64,56" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Activity dots -->
  <circle cx="20" cy="25" r="2" fill="#4caf50"/>
  <circle cx="44" cy="25" r="2" fill="#4caf50"/>
  <circle cx="20" cy="39" r="2" fill="#ff9800"/>
  <circle cx="44" cy="39" r="2" fill="#666"/>
</svg>
