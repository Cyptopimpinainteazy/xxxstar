<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- DevTools: code bracket + gear -->
  <!-- Left bracket -->
  <polyline points="20,12 10,32 20,52" stroke="#ff4488" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Right bracket -->
  <polyline points="44,12 54,32 44,52" stroke="#ff4488" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Slash -->
  <line x1="36" y1="14" x2="28" y2="50" stroke="#ff4488" stroke-width="2" opacity="0.5"/>
  <!-- Gear (small) -->
  <circle cx="50" cy="52" r="8" stroke="#ff6b35" stroke-width="1.5" fill="#ff6b35" fill-opacity="0.15"/>
  <circle cx="50" cy="52" r="3" fill="#ff6b35" opacity="0.4"/>
  <!-- Gear teeth -->
  <line x1="50" y1="43" x2="50" y2="46" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="58" x2="50" y2="61" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="52" x2="44" y2="52" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="52" x2="59" y2="52" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <!-- Build dot -->
  <circle cx="32" cy="32" r="2.5" fill="#4caf50"/>
</svg>
