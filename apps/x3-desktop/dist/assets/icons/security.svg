<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Security Vault: shield + lock -->
  <!-- Shield outline -->
  <path d="M32 4 L54 16 L54 36 Q54 52 32 60 Q10 52 10 36 L10 16 Z" stroke="#ef5350" stroke-width="2.5" fill="#ef5350" fill-opacity="0.08"/>
  <!-- Inner shield -->
  <path d="M32 12 L48 22 L48 35 Q48 48 32 54 Q16 48 16 35 L16 22 Z" stroke="#ef5350" stroke-width="1.5" fill="#ef5350" fill-opacity="0.05" opacity="0.6"/>
  <!-- Lock body -->
  <rect x="24" y="30" width="16" height="12" rx="2" stroke="#ff6b35" stroke-width="2" fill="#ff6b35" fill-opacity="0.2"/>
  <!-- Lock shackle -->
  <path d="M27 30 L27 24 Q27 18 32 18 Q37 18 37 24 L37 30" stroke="#ff6b35" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="32" cy="35" r="2" fill="#ff6b35"/>
  <line x1="32" y1="37" x2="32" y2="40" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round"/>
</svg>
