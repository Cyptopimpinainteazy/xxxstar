[build]
# Using default gcc linker
# rustflags = ["-C", "linker=clang"]

[target.x86_64-unknown-linux-gnu]
linker = "gcc"

# Use the tauri-vendor directory for all crate lookups.
# This overrides the workspace-root vendored-sources config (which points
# to the main workspace vendor/ dir that does NOT contain tauri crates).
[source.crates-io]
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "tauri-vendor"
