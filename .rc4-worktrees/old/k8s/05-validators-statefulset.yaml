apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: x3-validator
  namespace: x3-chain
  labels:
    app: x3-chain
    component: validator
spec:
  # ── Pod Identity ──────────────────────────────────────────────────────
  serviceName: x3-validators  # Headless service for peer discovery
  replicas: 3
  
  # ── Selection ────────────────────────────────────────────────────────
  selector:
    matchLabels:
      app: x3-chain
      component: validator
  
  # ── Update Strategy ──────────────────────────────────────────────────
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0  # Can update pods 0 and up
  
  # ── Pod Specification ────────────────────────────────────────────────
  template:
    metadata:
      labels:
        app: x3-chain
        component: validator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9616"
        prometheus.io/path: "/metrics"
    
    spec:
      # ── Scheduling ──────────────────────────────────────────────────
      affinity:
        podAntiAffinity:
          # Try to spread validators across different nodes
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - x3-chain
                    - key: component
                      operator: In
                      values:
                        - validator
                topologyKey: kubernetes.io/hostname
      
      # ── Containers ──────────────────────────────────────────────────
      containers:
        - name: validator
          image: docker.io/x3-chain/x3-chain-node:v1.0.0
          imagePullPolicy: IfNotPresent
          
          # ── Ports ──────────────────────────────────────────────────
          ports:
            - name: p2p
              containerPort: 30333
              protocol: TCP
            - name: rpc
              containerPort: 9933
              protocol: TCP
            - name: metrics
              containerPort: 9616
              protocol: TCP
          
          # ── Environment ────────────────────────────────────────────
          env:
            - name: VALIDATOR_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: LOG_LEVEL
              value: "info"
          
          # ── Command & Arguments ────────────────────────────────────
          command:
            - /usr/local/bin/x3-chain-node
          args:
            - --chain=/etc/x3/chain-spec.json
            - --validator
            - --name=$(VALIDATOR_NAME)
            - --base-path=/data/validator
            - --port=30333
            - --rpc-port=9933
            - --rpc-methods=safe
            - --prometheus-port=9616
            - --prometheus-external
            - --log=info
          
          # ── Health Checks ──────────────────────────────────────────
          livenessProbe:
            tcpSocket:
              port: rpc
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: rpc
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # ── Resources ──────────────────────────────────────────────
          resources:
            requests:
              cpu: 4
              memory: 8Gi
            limits:
              cpu: 8
              memory: 16Gi
          
          # ── Volume Mounts ─────────────────────────────────────────
          volumeMounts:
            - name: chain-spec
              mountPath: /etc/x3
              readOnly: true
            - name: validator-data
              mountPath: /data
            - name: node-keys
              mountPath: /etc/x3-keys
              readOnly: true
          
          # ── Security Context ──────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      
      # ── Pod Security Context ──────────────────────────────────────
      securityContext:
        fsGroup: 1000
      
      # ── Volumes ────────────────────────────────────────────────────
      volumes:
        - name: chain-spec
          configMap:
            name: x3-chain-spec
            defaultMode: 0444
        - name: node-keys
          secret:
            secretName: x3-validator-keys
            defaultMode: 0400
  
  # ── Volume Claim Templates ────────────────────────────────────────
  # Automatically created PVC for each pod ordinal
  volumeClaimTemplates:
    - metadata:
        name: validator-data
        labels:
          app: x3-chain
          component: validator-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 30Gi
        # Optional: specify storageClassName if using custom storage class
        # storageClassName: fast-ssd

---
# Headless Service for StatefulSet peer discovery
apiVersion: v1
kind: Service
metadata:
  name: x3-validators
  namespace: x3-chain
  labels:
    app: x3-chain
    component: validator
spec:
  clusterIP: None  # Headless service
  selector:
    app: x3-chain
    component: validator
  ports:
    - name: p2p
      port: 30333
      targetPort: p2p
      protocol: TCP
    - name: rpc
      port: 9933
      targetPort: rpc
      protocol: TCP
    - name: metrics
      port: 9616
      targetPort: metrics
      protocol: TCP
  publishNotReadyAddresses: true  # Allow peers to connect before pod is ready

---
# RPC Service (LoadBalancer for external access)
apiVersion: v1
kind: Service
metadata:
  name: x3-validator-rpc
  namespace: x3-chain
  labels:
    app: x3-chain
    component: validator-rpc
spec:
  type: LoadBalancer
  selector:
    app: x3-chain
    component: validator
  ports:
    - name: rpc
      port: 9933
      targetPort: 9933
      protocol: TCP
  sessionAffinity: None

---
# Metrics Service (for Prometheus scraping)
apiVersion: v1
kind: Service
metadata:
  name: x3-validator-metrics
  namespace: x3-chain
  labels:
    app: x3-chain
    component: validator-metrics
spec:
  type: ClusterIP
  selector:
    app: x3-chain
    component: validator
  ports:
    - name: metrics
      port: 9616
      targetPort: 9616
      protocol: TCP
