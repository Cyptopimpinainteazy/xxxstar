# Per-category scanner suppressions.
# Format: CATEGORY|REGEX|REASON
# - CATEGORY must match scanner category labels exactly.
# - REGEX is evaluated against full finding lines (<path>:<line>:<content>).
# - Use one entry per pattern; avoid regex alternation with `|` because `|`
#   is the field delimiter in this file.
# - Keep entries narrow and evidence-backed.

# x3-readiness-report intentionally defaults to local RPC for operator workflows.
LOCALHOST|^crates/x3-readiness-report/src/collector.rs:23:|Intentional local default endpoint for readiness tooling

# Unreachable localhost endpoint is intentionally used in readiness failure-mode tests.
LOCALHOST|^crates/x3-readiness-report/src/collector.rs:194:|Intentional unreachable endpoint in tests for Unknown behavior
LOCALHOST|^crates/x3-readiness-report/src/collector.rs:206:|Intentional unreachable endpoint in tests for Unknown behavior

# Replay guard uses an in-memory structure by design; persistence is handled at runtime layer.
MEMORY|^crates/x3-packet-standard/src/replay.rs:7:|Design note for in-memory replay guard implementation
