{{- if .Values.canary.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "explorer.fullname" . }}-canary
  labels:
    app: {{ include "explorer.fullname" . }}-canary
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "explorer.fullname" . }}-canary
{{- end -}}
