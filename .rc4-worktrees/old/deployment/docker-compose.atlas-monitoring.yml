version: '3.8'

services:
  # Ollama service - Local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: substreams-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-init.sh:/docker-entrypoint.sh
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - substreams-llm
    restart: unless-stopped

  # LLM Router Service - Routes queries to Ollama or OpenRouter
  llm-router:
    build:
      context: .
      dockerfile: Dockerfile.llm-service
    container_name: substreams-llm-router
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - OLLAMA_ENDPOINT=http://ollama:11434
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-ollama}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./llm-config.json:/app/llm-config.json:ro
      - ./llm-service:/app:ro
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - substreams-llm
    restart: unless-stopped

  # Prometheus - Time series database for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: substreams-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      - llm-router
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - substreams-llm
    restart: unless-stopped

  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: substreams-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana-llm-dashboard.json:/var/lib/grafana/dashboards/llm-dashboard.json:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - substreams-llm
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  substreams-llm:
    driver: bridge
