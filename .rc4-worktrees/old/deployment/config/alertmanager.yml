global:
  resolve_timeout: 5m
  slack_api_url: ${SLACK_WEBHOOK_URL}
  pagerduty_url: https://events.pagerduty.com/v2/enqueue

# The root route with all parameters, which are inherited by the child routes if they are not overwritten.
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

  routes:
    # Critical GPU Issues
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 5s
      repeat_interval: 1h
      continue: true

    # GPU Swarm Warnings
    - match:
        service: gpu-swarm
      receiver: 'gpu-swarm'
      group_wait: 30s
      repeat_interval: 4h

    # Infrastructure Issues
    - match:
        service: infrastructure
      receiver: 'infrastructure'
      repeat_interval: 6h

    # Development/Staging
    - match:
        environment: staging
      receiver: 'staging'
      group_wait: 60s
      repeat_interval: 24h

# Receivers for different scenarios
receivers:
  # Default receiver
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: '[{{ .GroupLabels.alertname }}]'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: '#0099ff'

  # Critical alerts go to PagerDuty + Slack
  - name: 'critical'
    slack_configs:
      - channel: '#critical-alerts'
        title: '⛔ CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: '#ff0000'
    pagerduty_configs:
      - service_key: ${PAGERDUTY_SERVICE_KEY}
        description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.instance }}'

  # GPU Swarm specific alerts
  - name: 'gpu-swarm'
    slack_configs:
      - channel: '#gpu-swarm-alerts'
        title: '[GPU Swarm] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: '#ff9900'
    webhook_configs:
      - url: 'http://localhost:5000/alerts'
        send_resolved: true

  # Infrastructure alerts
  - name: 'infrastructure'
    slack_configs:
      - channel: '#infrastructure'
        title: '[Infra] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: '#ffcc00'

  # Staging alerts (less aggressive)
  - name: 'staging'
    slack_configs:
      - channel: '#staging-alerts'
        title: '[Staging] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: '#00ff00'

# Inhibition rules - suppress certain alerts
inhibit_rules:
  # Suppress warning alerts if critical alert is firing
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'device']

  # Suppress if node is down
  - source_match:
      alertname: 'CoordinatorDown'
    target_match_re:
      alertname: 'Coordinator.*'
    equal: ['instance']
