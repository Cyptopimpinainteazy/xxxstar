<!doctype html>
<html>
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Who's Online</title><style>body{font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:#071024;color:#eaf6ff;padding:1.5rem}table{width:100%;border-collapse:collapse}td,th{padding:.5rem;border-bottom:1px solid rgba(255,255,255,.04)}th{color:#7ee3ff}</style></head>
<body>
  <h1>Currently Running Demos</h1>
  <table><thead><tr><th>Job</th><th>Company</th><th>RPC</th><th>TPS Target</th><th>Started</th></tr></thead><tbody id="body"></tbody></table>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.on('whoisonline_update', () => { load(); });
    socket.on('job_update', (d) => { load(); });

    async function load(){
      const r = await fetch('/api/whoisonline');
      const j = await r.json();
      const b = document.getElementById('body'); b.innerHTML='';
      j.forEach(l => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${l.jobId}</td><td>${l.company_id||'-'}</td><td>${l.rpc||'-'}</td><td>${l.evm_tps||'-'}</td><td>${l.started_at?new Date(l.started_at).toLocaleString():'-'}</td>`;
        b.appendChild(tr);
      })
    }
    load(); setInterval(load, 3000);
  </script>
</body>
</html>
