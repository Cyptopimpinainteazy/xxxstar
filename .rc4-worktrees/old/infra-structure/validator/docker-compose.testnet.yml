version: "3.9"

services:
  # ============================================================================
  # Mock Ethereum (anvil/Hardhat) for local EVM testing
  # ============================================================================
  ethereum-testnet:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: ccgv-ethereum-testnet
    command: >
      anvil
      --host 0.0.0.0
      --port 8545
      --chain-id 31337
      --accounts 10
      --balance 100
    ports:
      - "127.0.0.1:8545:8545"
    volumes:
      - ethereum_data:/anvil_data
    networks:
      - ccgv-testnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ============================================================================
  # Solana Validator for SVM testing (local validator)
  # ============================================================================
  solana-testnet:
    image: solanalabs/solana:latest
    container_name: ccgv-solana-testnet
    command: >
      solana-test-validator
      --bind-address 0.0.0.0
      --rpc-bind-address 0.0.0.0:8899
      --quiet
    ports:
      - "127.0.0.1:8899:8899"
      - "127.0.0.1:8900:8900"
    volumes:
      - solana_data:/test-ledger
    networks:
      - ccgv-testnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8899/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ============================================================================
  # Redis for atomic swap registry and metrics
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: ccgv-redis
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ccgv-testnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  # ============================================================================
  # Cross-Chain GPU Validator Service
  # ============================================================================
  ccgv-validator:
    build:
      context: .
      dockerfile: Dockerfile.testnet
    container_name: ccgv-validator-service
    depends_on:
      ethereum-testnet:
        condition: service_healthy
      solana-testnet:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # RPC Endpoints (internal Docker network)
      CCGV_EVM_RPC: "http://ethereum-testnet:8545"
      CCGV_SVM_RPC: "http://solana-testnet:8899"
      
      # Redis Configuration
      CCGV_REDIS_HOST: "redis"
      CCGV_REDIS_PORT: "6379"
      
      # GPU Configuration
      CCGV_REQUIRE_GPU: "false"  # Disabled for containerized testing
      CCGV_GPU_PARITY_CHECK: "false"
      
      # Logging
      CCGV_LOG_LEVEL: "DEBUG"
      RUST_LOG: "debug"
      RUST_BACKTRACE: "1"
    ports:
      - "127.0.0.1:8000:8000"  # Metrics endpoint
      - "127.0.0.1:9000:9000"  # RPC server endpoint
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ccgv_logs:/app/logs
    networks:
      - ccgv-testnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/metrics.json"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ============================================================================
  # Test Runner for E2E tests
  # ============================================================================
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: ccgv-test-runner
    depends_on:
      ccgv-validator:
        condition: service_healthy
    environment:
      CCGV_EVM_RPC: "http://ethereum-testnet:8545"
      CCGV_SVM_RPC: "http://solana-testnet:8899"
      CCGV_REDIS_HOST: "redis"
      CCGV_REDIS_PORT: "6379"
      CCGV_VALIDATOR_HOST: "ccgv-validator"
      CCGV_VALIDATOR_PORT: "8000"
    volumes:
      - ./tests:/tests
      - ./src:/src
      - test_results:/results
    networks:
      - ccgv-testnet
    entrypoint: ["python", "-m", "pytest", "-v", "--tb=short"]
    command: ["/tests"]

  # ============================================================================
  # Prometheus for metrics collection (optional)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ccgv-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - ccgv-testnet
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9090/graph"]
      interval: 5s
      timeout: 2s
      retries: 3

volumes:
  ethereum_data:
  solana_data:
  redis_data:
  ccgv_logs:
  prometheus_data:
  test_results:

networks:
  ccgv-testnet:
    driver: bridge
