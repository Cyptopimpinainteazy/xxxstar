# Shadow Lane Configuration (Node B)
# Role: Hot standby - ready for instant promotion

lane:
  id: shadow
  name: "Shadow GPU Lane B"
  role: shadow
  priority: 2
  region: us-east-1b  # Different AZ, same region
  
hardware:
  gpus:
    count: 4
    model: "NVIDIA A100 80GB"
    memory_per_gpu: "80GB"
    cuda_version: "12.3"
    devices: [0, 1, 2, 3]
    
  cpu:
    model: "AMD EPYC 7763"
    cores: 128
    threads: 256
    
  memory:
    total: "1TB"
    huge_pages: true
    numa_aware: true
    
  storage:
    type: "NVMe SSD RAID10"
    devices: 8
    capacity_per_device: "3.84TB"
    mount_point: "/data/acceleration"
    
  network:
    bandwidth: "200Gbps"
    mtu: 9000
    interfaces:
      - name: eth0
        ip: 10.0.2.10
        role: primary
      - name: eth1
        ip: 10.0.2.11
        role: heartbeat

gpu_config:
  preload_kernels: true  # Always warm - ready to take over
  kernel_dir: "/opt/ccgv/kernels"
  kernels:
    - secp256k1_batch
    - keccak256_batch
    - sha256_batch
    - ed25519_verify
    
  memory_management:
    pinned: true
    preallocate: true  # Keep GPU memory hot
    cache_size: "64GB"
    
  stream_config:
    streams_per_gpu: 32
    async_execution: true
    priority_streams: 8
    
  monitoring:
    nvidia_smi_interval: 1
    temperature_threshold: 80
    power_limit: 400
    memory_threshold: 95

shadow_mode:
  # Shadow-specific: listen but don't sign unless promoted
  listen_only: true
  mirror_state: true
  state_sync_interval: 1  # seconds - stay current
  warm_gpu: true  # Keep kernels loaded
  prefetch_enabled: true
  
performance:
  target_tps: 20_000_000  # Match primary
  max_latency_ms: 1.0
  batch_size: 10000
  prefetch_batches: 4
  
health_check:
  enabled: true
  interval: 5
  endpoints:
    - http://localhost:9000/health
  metrics:
    - gpu_utilization
    - memory_usage
    - kernel_execution_time
    - state_sync_lag
  thresholds:
    gpu_utilization_min: 20  # Lower than primary (not actively serving)
    memory_usage_max: 95
    kernel_timeout_ms: 50
    state_sync_lag_max_ms: 100  # Must stay synced

failover:
  enabled: true
  mode: "hot_standby"
  promotion_trigger: "primary_health_failure"
  promotion_time_target_ms: 3
  health_score_threshold: 0.3
  
  # When promoted, shadow becomes primary
  promotion_targets:
    - tertiary  # Shadow can failover to tertiary if it fails after promotion
    
  demotion_recovery:
    enabled: true
    cooldown: 60
    resume_shadow_after: 120

signer:
  mode: "remote"
  authority: "http://signer-service:8080"
  # Shadow does NOT hold signing authority unless promoted
  acquire_on_promotion: true
  lock_mechanism: "etcd"
  lock_ttl: 30
  heartbeat_interval: 5

toll_booth:
  enabled: true
  endpoint: "http://toll-booth:7000"
  # Shadow checks SLA but doesn't enforce until promoted
  passive_mode: true
  
chains:
  solana:
    enabled: true
    rpc_endpoints:
      - https://api.devnet.solana.com
      - https://api.mainnet-beta.solana.com
    adapter: "svm_validator"
    gpu_acceleration: true
    passive_sync: true  # Mirror state from primary
    
  ethereum:
    enabled: true
    rpc_endpoints:
      - https://eth-mainnet.g.alchemy.com/v2/YOUR_KEY
      - https://mainnet.infura.io/v3/YOUR_KEY
    adapter: "evm_validator"
    gpu_acceleration: true
    passive_sync: true
    
  arbitrum:
    enabled: true
    rpc_endpoints:
      - https://arb1.arbitrum.io/rpc
    adapter: "evm_validator"
    gpu_acceleration: true
    passive_sync: true
    
  zksync:
    enabled: true
    rpc_endpoints:
      - https://mainnet.era.zksync.io
    adapter: "evm_validator"
    gpu_acceleration: true
    passive_sync: true

replication:
  # Shadow replicates state from primary
  source: "primary"
  method: "stream"
  lag_tolerance_ms: 100
  verify_hash: true

logging:
  level: INFO
  format: json
  output: /var/log/ccgv/shadow_lane.log
  rotation:
    max_size: 1GB
    max_age: 7d
    
metrics:
  enabled: true
  port: 9092
  exporters:
    - prometheus
    - json
  flush_interval: 10
