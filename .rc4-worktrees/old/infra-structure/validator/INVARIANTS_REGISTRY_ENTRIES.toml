# Invariants Registry Entries for E2E Security Testing
# Add these to tests/invariants/registry.toml

# ============================================================================
# Security Invariants (INV-SEC-*)
# ============================================================================

[[invariant]]
id = "INV-SEC-001"
title = "Input Validation & Sanitization"
category = "security"
description = """
All transaction inputs (chain_id, signatures, pubkeys, payloads) must be 
validated for correct format, size, and content. Injection attacks, 
oversized payloads, and malformed data must be rejected before processing.
"""
tested_by = [
  "tests/test_security_e2e.py::TestInputValidationSanitization::test_chain_transaction_rejects_empty_signature",
  "tests/test_security_e2e.py::TestInputValidationSanitization::test_chain_transaction_rejects_empty_pubkey",
  "tests/test_security_e2e.py::TestInputValidationSanitization::test_chain_transaction_rejects_oversized_payload",
  "tests/test_security_e2e.py::TestInputValidationSanitization::test_chain_id_must_be_nonempty_string",
  "tests/test_security_e2e.py::TestInputValidationSanitization::test_invalid_chain_id_format_rejected",
  "tests/test_security_e2e.py::TestInputValidationSanitization::test_signature_size_validation_secp256k1",
  "tests/test_security_e2e.py::TestInputValidationSanitization::test_pubkey_size_validation_secp256k1",
  "tests/test_security_e2e.py::TestInputValidationSanitization::test_signature_size_validation_ed25519",
]

[[invariant]]
id = "INV-SEC-002"
title = "Private Key & Signature Handling Security"
category = "security"
description = """
Private keys must never be logged, printed, or exposed in string form.
Signature verification must fail when verified against wrong public keys.
Batch signature operations must preserve the pairing with original transactions.
Same message with different signers must produce different signatures.
"""
tested_by = [
  "tests/test_security_e2e.py::TestPrivateKeySignatureHandling::test_private_key_never_logged",
  "tests/test_security_e2e.py::TestPrivateKeySignatureHandling::test_signature_verification_fails_on_wrong_pubkey",
  "tests/test_security_e2e.py::TestPrivateKeySignatureHandling::test_signature_order_preserved_in_batch",
  "tests/test_security_e2e.py::TestPrivateKeySignatureHandling::test_same_message_different_pubkeys_different_validity",
]

[[invariant]]
id = "INV-SEC-003"
title = "RPC Endpoint Security Validation"
category = "security"
description = """
RPC URLs must be validated for HTTPS (except localhost). All requests must
have configurable timeouts to prevent hanging connections. RPC responses 
must be validated for correct JSON-RPC format. Malformed responses and
error conditions must be handled without crashes. Endpoint availability
must be verified before processing.
"""
tested_by = [
  "tests/test_security_e2e.py::TestRpcEndpointSecurity::test_rpc_url_must_be_https",
  "tests/test_security_e2e.py::TestRpcEndpointSecurity::test_rpc_url_localhost_allowed_for_testing",
  "tests/test_security_e2e.py::TestRpcEndpointSecurity::test_rpc_request_timeout_enforced",
  "tests/test_security_e2e.py::TestRpcEndpointSecurity::test_rpc_response_validation_rejects_malformed",
  "tests/test_security_e2e.py::TestRpcEndpointSecurity::test_rpc_error_response_handled",
  "tests/test_security_e2e.py::TestRpcEndpointSecurity::test_rpc_endpoint_availability_check",
]

[[invariant]]
id = "INV-SEC-004"
title = "Atomic Transaction Guarantees"
category = "security"
description = """
Atomic swaps across N chains must follow all-or-nothing semantics. Any 
invalid transaction must prevent the entire swap from proceeding. Failed 
swaps must automatically rollback to pre-swap state across all chains.
Swaps exceeding timeout must be automatically rolled back. Concurrent
swaps must remain isolated and not interfere with each other.
Valid state transitions are: PENDING -> {LOCKED,FAILED}, LOCKED -> {CONFIRMED,ROLLBACK},
CONFIRMED -> COMPLETED, ROLLBACK -> PENDING, FAILED/COMPLETED -> (terminal).
"""
tested_by = [
  "tests/test_security_e2e.py::TestTransactionAtomicityGuarantees::test_swap_cannot_proceed_with_unvalidated_txs",
  "tests/test_security_e2e.py::TestTransactionAtomicityGuarantees::test_rollback_reverses_all_chain_state",
  "tests/test_security_e2e.py::TestTransactionAtomicityGuarantees::test_timeout_triggers_automatic_rollback",
  "tests/test_security_e2e.py::TestTransactionAtomicityGuarantees::test_no_partial_atomic_swaps",
  "tests/test_security_e2e.py::TestTransactionAtomicityGuarantees::test_concurrent_swaps_isolated",
  "tests/test_security_e2e.py::TestTransactionAtomicityGuarantees::test_swap_state_transitions_are_valid",
]

# ============================================================================
# Dashboard Invariants (INV-DASH-*)
# ============================================================================

[[invariant]]
id = "INV-DASH-001"
title = "Dashboard Metrics Endpoint Validation"
category = "dashboard"
description = """
The /metrics.json endpoint must return valid JSON with all required fields.
TPS values must be non-negative. Success rate must be 0-1. GPU utilization
must be 0-100%. VRAM usage must not exceed total. Timestamps must be recent
(within 1 minute). All metric fields must have valid types and ranges.
"""
tested_by = [
  "tests/test_dashboard_e2e.py::TestDashboardMetricsEndpoint::test_metrics_endpoint_returns_json",
  "tests/test_dashboard_e2e.py::TestDashboardMetricsEndpoint::test_metrics_all_required_fields_present",
  "tests/test_dashboard_e2e.py::TestDashboardMetricsEndpoint::test_metrics_tps_values_are_non_negative",
  "tests/test_dashboard_e2e.py::TestDashboardMetricsEndpoint::test_metrics_success_rate_in_valid_range",
  "tests/test_dashboard_e2e.py::TestDashboardMetricsEndpoint::test_metrics_gpu_utilization_in_valid_range",
  "tests/test_dashboard_e2e.py::TestDashboardMetricsEndpoint::test_metrics_gpu_vram_not_oversubscribed",
  "tests/test_dashboard_e2e.py::TestDashboardMetricsEndpoint::test_metrics_timestamp_is_recent",
]

[[invariant]]
id = "INV-DASH-002"
title = "Dashboard Real-Time Updates"
category = "dashboard"
description = """
Dashboard must refresh metrics every 1000ms. All counters must update to
reflect current validator state. Pending swap counts, rollback counters,
and latency metrics must be fresh and reflect recent changes.
"""
tested_by = [
  "tests/test_dashboard_e2e.py::TestDashboardRealTimeUpdates::test_dashboard_refreshes_every_second",
  "tests/test_dashboard_e2e.py::TestDashboardRealTimeUpdates::test_pending_swaps_count_updates",
  "tests/test_dashboard_e2e.py::TestDashboardRealTimeUpdates::test_rollback_counter_increments",
  "tests/test_dashboard_e2e.py::TestDashboardRealTimeUpdates::test_gpu_utilization_updates_per_refresh",
  "tests/test_dashboard_e2e.py::TestDashboardRealTimeUpdates::test_latency_metrics_update",
]

[[invariant]]
id = "INV-DASH-003"
title = "Dashboard: No Sensitive Data Exposure"
category = "security/dashboard"
description = """
Dashboard metrics must never expose private keys, RPC credentials, or
sensitive chain state. Wallet balances, mnemonics, API keys, and secrets
must be excluded from metrics output. All sensitive data must be masked
or excluded from dashboard display.
"""
tested_by = [
  "tests/test_dashboard_e2e.py::TestDashboardSecurityNoSensitiveData::test_no_private_keys_in_metrics",
  "tests/test_dashboard_e2e.py::TestDashboardSecurityNoSensitiveData::test_no_rpc_credentials_exposed",
  "tests/test_dashboard_e2e.py::TestDashboardSecurityNoSensitiveData::test_no_chain_state_secrets",
]

[[invariant]]
id = "INV-DASH-004"
title = "Dashboard XSS & Injection Attack Protection"
category = "security/dashboard"
description = """
Dashboard must escape all dynamic content to prevent XSS attacks. Script
tags must be escaped in HTML output. DOM updates must use textContent
instead of innerHTML. Metrics endpoint must return application/json
Content-Type to prevent script execution. CORS headers must be properly
configured. All user input and dynamic data must be properly sanitized.
"""
tested_by = [
  "tests/test_dashboard_e2e.py::TestDashboardXssInjectionProtection::test_chain_name_xss_protection",
  "tests/test_dashboard_e2e.py::TestDashboardXssInjectionProtection::test_metrics_value_xss_protection",
  "tests/test_dashboard_e2e.py::TestDashboardXssInjectionProtection::test_gpu_label_injection_protection",
  "tests/test_dashboard_e2e.py::TestDashboardXssInjectionProtection::test_dom_text_content_not_html",
  "tests/test_dashboard_e2e.py::TestDashboardXssInjectionProtection::test_metrics_json_response_content_type",
  "tests/test_dashboard_e2e.py::TestDashboardXssInjectionProtection::test_cors_headers_properly_set",
]

# ============================================================================
# RPC Endpoint Invariants (INV-RPC-*)
# ============================================================================

[[invariant]]
id = "INV-RPC-001"
title = "RPC Endpoint Availability & Latency Monitoring"
category = "rpc"
description = """
RPC endpoints must be reachable and responsive. Availability must be
monitored and failures logged. Request latency must be measured for
performance monitoring. Unavailable endpoints must be retried. Rate
limiting (429 responses) must be handled appropriately. Timeout limits
must be respected.
"""
tested_by = [
  "tests/test_rpc_endpoints_e2e.py::TestRpcEndpointAvailability::test_rpc_endpoint_reachable",
  "tests/test_rpc_endpoints_e2e.py::TestRpcEndpointAvailability::test_rpc_latency_measurement",
  "tests/test_rpc_endpoints_e2e.py::TestRpcEndpointAvailability::test_rpc_endpoint_unavailable_handling",
  "tests/test_rpc_endpoints_e2e.py::TestRpcEndpointAvailability::test_rpc_timeout_respected",
  "tests/test_rpc_endpoints_e2e.py::TestRpcEndpointAvailability::test_rpc_rate_limiting_handling",
]

[[invariant]]
id = "INV-RPC-002"
title = "RPC Response Validation & Error Handling"
category = "rpc"
description = """
All RPC responses must conform to JSON-RPC 2.0 standard with either
result or error field. Block numbers must be hex-encoded. Balances
must be hex wei. Error responses must include code and message fields.
Null results must be distinguished from error conditions. Invalid or
malformed responses must be rejected.
"""
tested_by = [
  "tests/test_rpc_endpoints_e2e.py::TestRpcResponseValidation::test_valid_json_rpc_response",
  "tests/test_rpc_endpoints_e2e.py::TestRpcResponseValidation::test_invalid_json_rpc_response_missing_result_and_error",
  "tests/test_rpc_endpoints_e2e.py::TestRpcResponseValidation::test_eth_block_number_response_format",
  "tests/test_rpc_endpoints_e2e.py::TestRpcResponseValidation::test_eth_get_balance_response_format",
  "tests/test_rpc_endpoints_e2e.py::TestRpcResponseValidation::test_rpc_error_responses_have_code_and_message",
  "tests/test_rpc_endpoints_e2e.py::TestRpcResponseValidation::test_null_result_vs_error_distinguished",
]

[[invariant]]
id = "INV-RPC-003"
title = "Transaction Broadcasting & Confirmation"
category = "rpc"
description = """
Transaction broadcasting must return valid transaction hash (66 chars,
0x-prefixed). Transaction receipts must confirm block inclusion with
blockNumber and status fields. Status 0x1 indicates success, 0x0 indicates
failure. Fee estimation must be available. Solana commitment levels
(processed/confirmed/finalized) must be recognized.
"""
tested_by = [
  "tests/test_rpc_endpoints_e2e.py::TestTransactionBroadcastAndConfirmation::test_eth_send_transaction_returns_hash",
  "tests/test_rpc_endpoints_e2e.py::TestTransactionBroadcastAndConfirmation::test_transaction_receipt_confirms_inclusion",
  "tests/test_rpc_endpoints_e2e.py::TestTransactionBroadcastAndConfirmation::test_transaction_status_success_vs_failure",
  "tests/test_rpc_endpoints_e2e.py::TestTransactionBroadcastAndConfirmation::test_solana_transaction_confirmation_levels",
  "tests/test_rpc_endpoints_e2e.py::TestTransactionBroadcastAndConfirmation::test_transaction_fee_estimation_evm",
]

[[invariant]]
id = "INV-RPC-004"
title = "Mock vs Real RPC Response Consistency"
category = "testing"
description = """
Mock RPC server responses must be compatible with and consistent with
real RPC responses. Error format must match JSON-RPC standard. Response
structure must be identical between mock and real. Mock must be
deterministic and repeatable for testing.
"""
tested_by = [
  "tests/test_rpc_endpoints_e2e.py::TestMockVsRealRpcConsistency::test_mock_and_real_eth_block_number_format_match",
  "tests/test_rpc_endpoints_e2e.py::TestMockVsRealRpcConsistency::test_mock_and_real_rpc_error_format_match",
  "tests/test_rpc_endpoints_e2e.py::TestMockVsRealRpcConsistency::test_mock_rpc_deterministic_across_calls",
]
