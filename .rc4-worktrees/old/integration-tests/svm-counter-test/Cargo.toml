[package]
name = "svm-counter-test"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
svm_counter = { path = "../../crates/svm-counter" }
solana-program = "3.0.0"
solana-program-test = "3.0.0"
solana-sdk = "3.0.0"
tokio = { version = "1", features = ["macros", "rt"] }

[patch.crates-io]
# Match root workspace override so this isolated workspace uses the same curve25519-dalek
curve25519-dalek = { git = "https://github.com/dalek-cryptography/curve25519-dalek", tag = "3.2.1" }
