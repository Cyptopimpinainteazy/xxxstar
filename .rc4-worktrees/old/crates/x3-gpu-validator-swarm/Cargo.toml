[package]
name = "x3-gpu-validator-swarm"
version = "0.1.0"
edition = "2021"
description = "X3 GPU Validator Swarm - Deterministic GPU validation with CPU verification"
authors = ["X3 Chain Team"]
license = "MIT"
repository = "https://github.com/x3-chain/x3-chain"

[[bin]]
name = "x3-validator"
path = "src/bin/x3_validator.rs"

[[bin]]
name = "x3-swarm-orchestrator"
path = "src/bin/x3_swarm_orchestrator.rs"

[[bin]]
name = "x3-swarm-bench"
path = "src/bin/x3_bench.rs"

[[bin]]
name = "x3-cpu-validator"
path = "src/bin/x3_cpu_validator.rs"

[features]
default = ["cuda"]
cuda = []
opencl = []
metal = []
vulkan = []

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# Networking
libp2p = { version = "0.53", features = ["tcp", "noise", "yamux", "gossipsub", "mdns", "kad", "identify", "ping"] }
hyper-util = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_bytes = "0.11"
bincode = "1.3"

# Crypto
blake2 = "0.10"
blake3 = "1.5"
sha2 = "0.10"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
secp256k1 = { version = "0.28", features = ["recovery", "global-context"] }
rand = "0.8"
getrandom = "0.2"

# Metrics & logging
tracing = "0.1"
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
prometheus = "0.14.0"
log = "0.4"

# HTTP server
axum = "0.7"
hyper = "1.8"
tower-http = { version = "0.4", features = ["fs", "trace"] }

# Utils
thiserror = "1.0"
anyhow = "1.0"
parking_lot = "0.12"
dashmap = "5.5"
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"
toml = "0.8"
humantime-serde = "1.1"
once_cell = "1.18"

# For CPU verification
keccak-hash = "0.1"

# GPU and VM
x3-vm = { path = "../x3-vm" }
x3-backend = { path = "../x3-backend" }
x3-orchestra-control-plane = { path = "../x3-orchestra-control-plane" }

# For CPU detection
num_cpus = "1.17"

# For telemetry
reqwest = { version = "0.11", features = ["json", "blocking", "rustls-tls"] }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.9"
criterion = { version = "0.5", features = ["async_tokio"] }

[[bench]]
name = "e2e_tps"
harness = false
