# GPU Swarm Node Configuration
# 3x GTX 1070 setup

[identity]
keypair_path = "/etc/gpu-swarm/node.key"
display_name = "x3-x31-3gpu"
region = "local"

[network]
listen_addresses = ["/ip4/0.0.0.0/tcp/30333", "/ip4/0.0.0.0/udp/30333/quic-v1"]
bootstrap_nodes = []
coordinator_endpoint = "http://localhost:9000"
max_peers = 50
enable_mdns = true
enable_dht = true

[gpu]
enable_cuda = true
enable_opencl = false
enable_vulkan = false
device_indices = [0, 1, 2]
max_memory_mb = 0
power_limit_percent = 0

[execution]
max_concurrent_tasks = 6
task_timeout = 300
sandbox_enabled = true
max_payload_size = 16777216
accepted_task_types = ["x3_bytecode", "mempool_sim", "route_optimize", "model_training", "zk_proving"]
min_reward_threshold = 0

[rewards]
min_stake = 1000
auto_restake = false
claim_threshold = 100
