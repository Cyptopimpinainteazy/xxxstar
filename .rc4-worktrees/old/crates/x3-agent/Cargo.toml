[package]
name = "x3-agent"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "X3 Agent System — permissionless bonded agents with reputation tracking"

[dependencies]
x3-proof = { path = "../x3-proof" }
x3-slash = { path = "../x3-slash" }
x3-fees = { path = "../x3-fees" }
serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
hex = "0.4"
thiserror = "1.0"

[dev-dependencies]
serde_json = "1.0"
