[package]
name = "quantum-swarm"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Quantum Swarm Executor - Hybrid quantum-classical compute intelligence for X3 Chain"
authors = ["X3 Chain Team"]
repository = "https://github.com/x3-chain/x3-chain"
keywords = ["quantum", "swarm", "optimization", "blockchain", "defi"]
categories = ["science", "algorithms", "finance"]

[features]
default = ["std"]
std = [
    "serde/std",
    "serde_json/std",
]
# Enable external QPU backends (IBM, AWS Braket, Google Cirq)
external-qpu = []
# Enable GPU-accelerated quantum simulation
gpu-sim = []
# Enable evolutionary algorithm features
evolution = []
# Full quantum mode with all features
full-quantum = ["external-qpu", "gpu-sim", "evolution"]

[dependencies]
# Serialization
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }

# Async runtime
tokio = { version = "1.0", features = ["full", "sync", "time", "macros", "rt-multi-thread"] }
async-trait = "0.1"
futures = "0.3"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# UUID and hashing
uuid = { version = "1.0", features = ["v4", "serde"] }
blake3 = "1.5"
sha2 = "0.10"

# Numeric computation
num-complex = { version = "0.4", features = ["serde"] }
ndarray = { version = "0.15", features = ["serde"] }
nalgebra = { version = "0.32", features = ["serde-serialize"] }
rand = "0.8"
rand_chacha = "0.3"

# Quantum circuit representation
petgraph = "0.6"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { workspace = true, features = ["env-filter"] }

# HTTP client for external QPU APIs
reqwest = { version = "0.11", features = ["json", "rustls-tls"], optional = true }

[dev-dependencies]
tokio-test = "0.4"
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.0"
approx = "0.5"

[[bench]]
name = "quantum_bench"
harness = false
