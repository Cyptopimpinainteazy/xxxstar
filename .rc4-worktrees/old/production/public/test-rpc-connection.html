<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X3 RPC Connection Test</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e27;
      color: #30e8ff;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .test {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #30e8ff;
      border-radius: 5px;
      background: #0d1225;
    }
    .test h3 {
      margin-top: 0;
      color: #4a90ff;
    }
    .status {
      padding: 10px;
      margin: 5px 0;
      border-radius: 3px;
      font-size: 12px;
    }
    .success {
      background: #1a3a1a;
      color: #26e8a0;
    }
    .error {
      background: #3a1a1a;
      color: #ff4e6a;
    }
    .info {
      background: #1a2a3a;
      color: #30e8ff;
    }
    button {
      background: #4a90ff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      margin: 5px;
    }
    button:hover {
      background: #3a70df;
    }
    .log {
      background: #0a0e27;
      border: 1px solid #30e8ff;
      padding: 10px;
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.4;
    }
  </style>
  <script src="js/x3-nav-loader.js"></script>
</head>
<body>
  <h1>X3 RPC Connection Diagnostic</h1>

  <div class="test">
    <h3>HTTP RPC Test (localhost:9933)</h3>
    <button onclick="testHttpRpc()">Test HTTP RPC</button>
    <div id="http-result" class="status"></div>
  </div>

  <div class="test">
    <h3>WebSocket Connection Test (localhost:9933)</h3>
    <button onclick="testWebSocket()">Test WebSocket</button>
    <div id="ws-result" class="status"></div>
  </div>

  <div class="test">
    <h3>Tunnel Endpoint Tests</h3>
    <button onclick="testTunnelRpc()">Test Tunnel RPC (https://rpc.x3star.net)</button>
    <div id="tunnel-rpc-result" class="status"></div>
    <button onclick="testTunnelWs()">Test Tunnel WS (wss://ws.x3star.net)</button>
    <div id="tunnel-ws-result" class="status"></div>
  </div>

  <div class="test">
    <h3>x3-live-data.js Configuration</h3>
    <div id="config-result" class="status info"></div>
  </div>

  <div class="log" id="log"></div>

  <script>
    function log(msg) {
      const logEl = document.getElementById('log');
      logEl.textContent += new Date().toLocaleTimeString() + ' - ' + msg + '\n';
      logEl.scrollTop = logEl.scrollHeight;
    }

    function displayResult(elementId, success, message) {
      const el = document.getElementById(elementId);
      el.className = 'status ' + (success ? 'success' : 'error');
      el.textContent = message;
    }

    async function testHttpRpc() {
      log('Testing HTTP RPC...');
      try {
        const response = await fetch('http://localhost:9933', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: 1, jsonrpc: '2.0', method: 'system_health', params: [] })
        });
        const data = await response.json();
        if (data.result) {
          displayResult('http-result', true,
            `✓ Connected! Peers: ${data.result.peers}, Syncing: ${data.result.isSyncing}`);
          log('HTTP RPC success: ' + JSON.stringify(data.result));
        } else {
          displayResult('http-result', false, '✗ No result: ' + JSON.stringify(data));
          log('HTTP RPC error: ' + JSON.stringify(data));
        }
      } catch (e) {
        displayResult('http-result', false, '✗ Error: ' + e.message);
        log('HTTP RPC failed: ' + e.message);
      }
    }

    function testWebSocket() {
      log('Testing WebSocket...');
      return new Promise(() => {
        const ws = new WebSocket('ws://localhost:9933');
        const timeout = setTimeout(() => {
          ws.close();
          displayResult('ws-result', false, '✗ Timeout (5s)');
          log('WebSocket timeout');
        }, 5000);

        ws.onopen = () => {
          clearTimeout(timeout);
          displayResult('ws-result', true, '✓ Connected!');
          log('WebSocket connected');
          ws.send(JSON.stringify({ id: 1, jsonrpc: '2.0', method: 'system_health', params: [] }));
        };

        ws.onmessage = (event) => {
          clearTimeout(timeout);
          log('WebSocket message: ' + event.data.slice(0, 100));
          ws.close();
        };

        ws.onerror = (error) => {
          clearTimeout(timeout);
          displayResult('ws-result', false, '✗ Error: ' + error.message);
          log('WebSocket error: ' + error.message);
        };

        ws.onclose = () => {
          clearTimeout(timeout);
        };
      });
    }

    async function testTunnelRpc() {
      log('Testing Tunnel RPC (https://rpc.x3star.net)...');
      try {
        const response = await fetch('https://rpc.x3star.net', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: 1, jsonrpc: '2.0', method: 'system_health', params: [] })
        });
        const data = await response.json();
        displayResult('tunnel-rpc-result', !!data.result,
          data.result ? '✓ Connected via tunnel!' : '✗ No result: ' + JSON.stringify(data));
        log('Tunnel RPC: ' + JSON.stringify(data).slice(0, 100));
      } catch (e) {
        displayResult('tunnel-rpc-result', false, '✗ Error: ' + e.message);
        log('Tunnel RPC failed: ' + e.message);
      }
    }

    function testTunnelWs() {
      log('Testing Tunnel WebSocket (wss://ws.x3star.net)...');
      return new Promise(() => {
        const ws = new WebSocket('wss://ws.x3star.net');
        const timeout = setTimeout(() => {
          ws.close();
          displayResult('tunnel-ws-result', false, '✗ Timeout (5s)');
          log('Tunnel WebSocket timeout');
        }, 5000);

        ws.onopen = () => {
          clearTimeout(timeout);
          displayResult('tunnel-ws-result', true, '✓ Connected via tunnel!');
          log('Tunnel WebSocket connected');
          ws.send(JSON.stringify({ id: 1, jsonrpc: '2.0', method: 'system_health', params: [] }));
        };

        ws.onmessage = (event) => {
          log('Tunnel WebSocket message received');
          ws.close();
        };

        ws.onerror = (error) => {
          clearTimeout(timeout);
          displayResult('tunnel-ws-result', false, '✗ Error: ' + error.message);
          log('Tunnel WebSocket error: ' + error.message);
        };

        ws.onclose = () => {
          clearTimeout(timeout);
        };
      });
    }

    // Show configuration on load
    window.addEventListener('DOMContentLoaded', () => {
      const config = `
WS_ENDPOINT: ${window.X3_RPC_WS || 'ws://localhost:9933'}
HTTP_ENDPOINT: ${window.X3_RPC_HTTP || 'http://localhost:9933'}
Page URL: ${window.location.href}
      `.trim();
      document.getElementById('config-result').textContent = config;

      // Auto-run tests
      setTimeout(() => {
        testHttpRpc();
        setTimeout(() => testWebSocket(), 1000);
      }, 500);
    });
  </script>
</body>
</html>
