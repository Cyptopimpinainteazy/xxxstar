[package]
name = "x3-gpu-parity-core"
version = "0.1.0"
edition = "2021"
description = "Pure Rust source of truth for X3 CPU↔GPU validator parity. Asserts that the canonical hash pipeline (sha256, blake3, keccak256) is byte-equivalent across CPU and GPU paths against shared/test-vectors/gpu_hash_parity.json."
publish = false

[lib]
name = "x3_gpu_parity_core"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
sha2 = "0.10"
blake3 = "1"
tiny-keccak = { version = "2", features = ["keccak"] }

[dev-dependencies]
# tests/parity_vectors.rs uses only std + serde + the hash crates above.

# Standalone crate (NOT a member of the root workspace) so adding it does not
# pull GPU/CUDA toolchains into the parent build graph. Mirrors the layout of
# X3-contracts/shared/parity-core/.
[workspace]
