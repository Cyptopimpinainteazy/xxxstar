[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
verbosity = 2
fuzz = { runs = 256 }
invariant = { runs = 64, depth = 32, fail_on_revert = false }
remappings = [
    "forge-std/=../forge-std/src/",
]

[profile.ci]
fuzz = { runs = 1024 }
invariant = { runs = 256, depth = 64, fail_on_revert = false }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
