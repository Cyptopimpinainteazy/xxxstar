<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pluginGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main plug body -->
  <rect x="40" y="24" width="48" height="60" rx="4" fill="url(#pluginGrad)" opacity="0.9"/>
  <!-- Prongs (left) -->
  <rect x="32" y="68" width="8" height="24" fill="url(#pluginGrad)" opacity="0.8"/>
  <!-- Prongs (right) -->
  <rect x="88" y="68" width="8" height="24" fill="url(#pluginGrad)" opacity="0.8"/>
  <!-- Contact points -->
  <circle cx="44" cy="28" r="4" fill="url(#pluginGrad)" opacity="0.7"/>
  <circle cx="64" cy="28" r="4" fill="url(#pluginGrad)" opacity="0.7"/>
  <circle cx="84" cy="28" r="4" fill="url(#pluginGrad)" opacity="0.7"/>
  <!-- Connecting arc -->
  <path d="M 32 72 Q 64 85 96 72" fill="none" stroke="url(#pluginGrad)" stroke-width="2" opacity="0.5"/>
</svg>