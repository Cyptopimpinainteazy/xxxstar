<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="treasuryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Building front -->
  <rect x="28" y="48" width="72" height="56" fill="none" stroke="url(#treasuryGrad)" stroke-width="3"/>
  <!-- Pillars -->
  <rect x="36" y="48" width="8" height="56" fill="url(#treasuryGrad)" opacity="0.3"/>
  <rect x="52" y="48" width="8" height="56" fill="url(#treasuryGrad)" opacity="0.3"/>
  <rect x="68" y="48" width="8" height="56" fill="url(#treasuryGrad)" opacity="0.3"/>
  <rect x="84" y="48" width="8" height="56" fill="url(#treasuryGrad)" opacity="0.3"/>
  <!-- Pediment / triangle roof -->
  <polygon points="24,48 64,20 104,48" fill="none" stroke="url(#treasuryGrad)" stroke-width="3"/>
  <!-- Door -->
  <rect x="52" y="80" width="24" height="24" rx="12" fill="url(#treasuryGrad)" opacity="0.5"/>
  <!-- Dollar sign -->
  <text x="64" y="98" text-anchor="middle" fill="url(#treasuryGrad)" font-size="16" font-weight="bold">$</text>
</svg>
