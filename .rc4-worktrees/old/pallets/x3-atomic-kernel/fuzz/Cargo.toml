[package]
name = "pallet-x3-kernel-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

# Exclude from root workspace to allow nightly fuzz builds
[workspace]

[dependencies]
libfuzzer-sys = "0.4"
parity-scale-codec = { version = "3", features = ["derive"] }
sp-core = { default-features = false, git = "https://github.com/paritytech/polkadot-sdk", tag = "polkadot-stable2603" }

[dependencies.pallet-x3-atomic-kernel]
path = ".."

[[bin]]
name = "fuzz_target_1"
path = "fuzz_targets/fuzz_target_1.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_rollback"
path = "fuzz_targets/fuzz_rollback.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_proof_validation"
path = "fuzz_targets/fuzz_proof_validation.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_codec_parsing"
path = "fuzz_targets/fuzz_codec_parsing.rs"
test = false
doc = false
bench = false
