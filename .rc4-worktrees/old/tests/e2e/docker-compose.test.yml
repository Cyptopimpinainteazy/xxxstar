version: '3.8'

services:
  # Blockchain Node
  x3-node:
    image: x3-chain:latest
    build:
      context: ../..
      dockerfile: Dockerfile.test
    container_name: x3-testnet-node
    ports:
      - "9933:9933"   # RPC
      - "9944:9944"   # WebSocket
      - "30333:30333" # P2P
    environment:
      - X3_NODE_ENV=testnet
      - X3_RPC_EXTERNAL=true
      - X3_RPC_CORS=all
      - X3_RPC_METHODS=unsafe
      - X3_NO_TELEMETRY=true
      - X3_NO_MDNS=true
      - X3_NO_PRIVATE_IPV4=true
      - X3_LISTEN_ADDR=0.0.0.0:30333
      - X3_PUBLIC_ADDR=127.0.0.1:30333
    volumes:
      - testnet-data:/x3/data
      - ./logs:/x3/logs
    command: >
      --dev
      --rpc-external
      --rpc-cors all
      --rpc-methods unsafe
      --no-telemetry
      --no-mdns
      --no-private-ipv4
      --listen-addr /ip4/0.0.0.0/tcp/30333
      --public-addr /ip4/127.0.0.1/tcp/30333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9933/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - testnet
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: x3-testnet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - testnet

  # PostgreSQL for test data storage
  postgres:
    image: postgres:15-alpine
    container_name: x3-testnet-postgres
    environment:
      POSTGRES_DB: x3_testnet
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d x3_testnet"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - testnet

  # Mock External Services
  mock-dns-server:
    image: nginx:alpine
    container_name: x3-testnet-mock-dns
    ports:
      - "8080:80"
    volumes:
      - ./mock-data:/usr/share/nginx/html
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - testnet

  mock-gpu-swarm:
    image: x3-chain:gpu-mock
    build:
      context: ../..
      dockerfile: Dockerfile.gpu-mock
    container_name: x3-testnet-gpu-swarm
    ports:
      - "8081:8081"
    environment:
      - GPU_SWARM_PORT=8081
      - GPU_SWARM_NODES=4
      - GPU_SWARM_MEMORY=32768
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - testnet

  mock-external-chains:
    image: x3-chain:chains-mock
    build:
      context: ../..
      dockerfile: Dockerfile.chains-mock
    container_name: x3-testnet-external-chains
    ports:
      - "8082:8082"
    environment:
      - CHAINS_PORT=8082
      - CHAINS_AVALANCHE_ENABLED=true
      - CHAINS_BSC_ENABLED=true
      - CHAINS_ARBITRUM_ENABLED=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - testnet

  # Test Runner Service
  e2e-test-runner:
    image: x3-chain:test-runner
    build:
      context: ../..
      dockerfile: Dockerfile.test-runner
    container_name: x3-testnet-e2e-runner
    environment:
      - TEST_ENVIRONMENT=testnet
      - NODE_URL=http://x3-node:9933
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://testuser:testpass@postgres:5432/x3_testnet
      - MOCK_DNS_URL=http://mock-dns-server:8080
      - MOCK_GPU_URL=http://mock-gpu-swarm:8081
      - MOCK_CHAINS_URL=http://mock-external-chains:8082
    volumes:
      - ./test-results:/test-results
      - ./logs:/logs
    depends_on:
      x3-node:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - testnet

  # Monitoring and Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: x3-testnet-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - testnet

  grafana:
    image: grafana/grafana:latest
    container_name: x3-testnet-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/apps/dash-legacy-2-legacy-2boards:/etc/grafana/provisioning/apps/dash-legacy-2-legacy-2boards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - testnet

  # Alert Manager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: x3-testnet-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - testnet

volumes:
  testnet-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

networks:
  testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
