[package]
name = "x3-swarm-api"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.7"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"

# X3 Swarm Core
x3-swarm-core = { path = "../../crates/x3-swarm-core" }

[dependencies.uuid]
version = "1.8"
features = ["v4", "serde"]
