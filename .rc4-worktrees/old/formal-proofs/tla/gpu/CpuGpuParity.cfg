SPECIFICATION Spec

CONSTANTS
    Vectors    = {v_sha256_empty, v_sha256_abc, v_blake3_empty, v_keccak256_empty}
    \* Digests modelled as small integers — TLC only needs equality, not
    \* the actual 256-bit values. Flipping any number here surfaces a
    \* counter-example pinpointing the divergent vector.
    SpecDigest = (v_sha256_empty    :> 1
               @@ v_sha256_abc      :> 2
               @@ v_blake3_empty    :> 3
               @@ v_keccak256_empty :> 4)
    CpuDigest  = (v_sha256_empty    :> 1
               @@ v_sha256_abc      :> 2
               @@ v_blake3_empty    :> 3
               @@ v_keccak256_empty :> 4)
    GpuDigest  = (v_sha256_empty    :> 1
               @@ v_sha256_abc      :> 2
               @@ v_blake3_empty    :> 3
               @@ v_keccak256_empty :> 4)

INVARIANTS
    Invariant
    CpuMatchesSpec
    GpuMatchesSpec
    PathsAgree

CHECK_DEADLOCK FALSE
