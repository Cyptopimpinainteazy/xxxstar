SPECIFICATION Spec

CONSTANTS
    \* Three milestones suffice to exercise every gate combination:
    \*   m_good        — fully eligible, must end up in `funded`
    \*   m_no_budget   — zero budget, must end up in `rejected`
    \*   m_bad_receipt — receipt is "partial", must end up in `rejected`
    Milestones    = {m_good, m_no_budget, m_bad_receipt}
    Receipts      = {r_ok, r_partial}
    Deliverable   = (m_good        :> "ship-it"
                  @@ m_no_budget   :> "no-budget"
                  @@ m_bad_receipt :> "weak-receipt")
    Budget        = (m_good        :> 100
                  @@ m_no_budget   :> 0
                  @@ m_bad_receipt :> 50)
    ReceiptOf     = (m_good        :> r_ok
                  @@ m_no_budget   :> r_ok
                  @@ m_bad_receipt :> r_partial)
    ReceiptStatus = (r_ok      :> "verified"
                  @@ r_partial :> "partial")

INVARIANTS
    Invariant
    NoFundingWithoutVerifiedReceipt
    NoFundingWithoutDeliverableOrBudget
    Disjoint

CHECK_DEADLOCK FALSE
