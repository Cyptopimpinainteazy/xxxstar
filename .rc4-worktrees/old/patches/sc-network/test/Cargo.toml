[package]
description = "Integration tests for Substrate network protocol"
name = "sc-network-test"
version = "0.8.0"
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
authors = ["Parity Technologies <admin@parity.io>"]
edition = "2021"
publish = false
homepage = "https://substrate.io"
repository = "https://github.com/paritytech/substrate/"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
tokio = "1.22.0"
async-trait = "0.1.57"
futures = "0.3.21"
futures-timer = "3.0.1"
libp2p = "0.51.3"
log = "0.4.17"
parking_lot = "0.12.1"
rand = "0.8.5"
sc-block-builder = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sc-client-api = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sc-consensus = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sc-network = { version = "0.10.0-dev", path = "../" }
sc-network-common = { version = "0.10.0-dev", path = "../common" }
sc-utils = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sc-network-light = { version = "0.10.0-dev", path = "../light" }
sc-network-sync = { version = "0.10.0-dev", path = "../sync" }
sc-service = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512", default-features = false, features = ["test-helpers"] }
sp-blockchain = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-consensus = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-tracing = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
substrate-test-runtime = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
substrate-test-runtime-client = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
