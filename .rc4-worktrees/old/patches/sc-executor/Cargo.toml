[package]
name = "sc-executor"
version = "0.10.0-dev"
authors = ["Parity Technologies <admin@parity.io>"]
edition = "2021"
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage = "https://substrate.io"
repository = "https://github.com/paritytech/substrate/"
description = "A crate that provides means of executing/dispatching calls into the runtime."
documentation = "https://docs.rs/sc-executor"
readme = "docs/root/README.md"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
parking_lot = "0.12.1"
schnellru = "0.2.1"
tracing = "0.1.29"

codec = { package = "parity-scale-codec", version = "3.6.1" }
sc-executor-common = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sc-executor-wasmtime = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-externalities = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-io = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-panic-handler = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-runtime-interface = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-trie = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-version = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-wasm-interface = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }

[dev-dependencies]
array-bytes = "6.1"
assert_matches = "1.3.0"
wat = "1.0"
sc-runtime-test = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
substrate-test-runtime = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-state-machine = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-maybe-compressed-blob = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sc-tracing = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-tracing = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
tracing-subscriber = "0.3.20"
paste = "1.0"
regex = "1.6.0"
criterion = "0.4.0"
env_logger = "0.9"
num_cpus = "1.13.1"
tempfile = "3.3.0"

[[bench]]
name = "bench"
harness = false
required-features = ["bench"]

[features]
default = ["std"]
# This crate does not have `no_std` support, we just require this for tests
std = []
wasm-extern-trace = []
bench = []
