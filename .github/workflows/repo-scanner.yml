name: Repo Scanner

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday at 4am UTC
  workflow_dispatch:        # Manual trigger
  push:
    paths:
      - 'tools/agent_scanner/**'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for git log dates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scanner
        run: |
          python3 tools/agent_scanner/scan.py \
            --repo . \
            --stale-days 365 \
            --artifact-days 180 \
            --out-json tools/agent_scanner/checklist.json \
            --out-md tools/agent_scanner/CHECKLIST.md

      - name: Upload checklist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-checklist
          path: |
            tools/agent_scanner/checklist.json
            tools/agent_scanner/CHECKLIST.md
          retention-days: 30

      - name: Commit checklist if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/agent_scanner/checklist.json tools/agent_scanner/CHECKLIST.md
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update repo cleanup checklist [skip ci]"
          git push || echo "Push skipped (fork or no write permission)"

      - name: Print summary
        run: |
          echo "### Cleanup Checklist Summary" >> $GITHUB_STEP_SUMMARY
          python3 - <<'EOF'
          import json, os
          try:
              with open("tools/agent_scanner/checklist.json") as f:
                  data = json.load(f)
              items = data.get("items", [])
              by_type = {}
              for it in items:
                  by_type.setdefault(it["type"], []).append(it)
              print(f"Total items: {len(items)}")
              for t, lst in sorted(by_type.items()):
                  print(f"- {t}: {len(lst)}")
          except Exception as e:
              print(f"Error reading checklist: {e}")
          EOF
