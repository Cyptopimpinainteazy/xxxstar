name: Formal Verification Gate
on:
   pull_request:
     branches: [main, develop]
     paths:
       - 'pallets/**'
       - 'runtime/**'
       - 'x3-vm/**'
       - 'formal-proofs/**'
       - 'proof-forge/src/runners/formal_proofs.rs'
  push:
    branches: [main]
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  formal-verification:
    name: Run Formal Verification Proofs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Formal Verification Tools
        id: cache-fv-tools
        uses: actions/cache@v4
        with:
          path: |
            /opt/tla2tools.jar
            ~/.opam
            /opt/k
            /opt/dafny
          key: ${{ runner.os }}-fv-tools-v1
          restore-keys: |
            ${{ runner.os }}-fv-tools-

      - name: Install TLA+ Model Checker
        if: steps.cache-fv-tools.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt
          cd /opt
          sudo wget -q https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          echo "✅ TLA+ installed"

      - name: Install Coq Proof Assistant
        if: steps.cache-fv-tools.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y coq
          echo "✅ Coq installed"

      - name: Install K Framework
        if: steps.cache-fv-tools.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git maven
          cd /opt
          sudo rm -rf k
          sudo git clone --depth=1 --recurse-submodules https://github.com/runtimeverification/k.git
          cd k
          sudo mvn package -DskipTests
          test -x /opt/k/k-distribution/target/release/k/bin/kprove
          sudo ln -sf /opt/k/k-distribution/target/release/k/bin/kprove /usr/local/bin/kprove
          echo "✅ K Framework installed"

      - name: Install Dafny (Optional)
        if: steps.cache-fv-tools.outputs.cache-hit != 'true'
        run: |
          cd /opt
          sudo wget -q https://github.com/dafny-lang/dafny/releases/download/v4.2.0/dafny-4.2.0-x64-ubuntu-20.04.zip
          sudo unzip -q dafny-4.2.0-x64-ubuntu-20.04.zip -d /opt/
          sudo mv dafny /opt/dafny
          echo "✅ Dafny installed"

      - name: Verify Tool Installations
        run: |
          echo "Verifying formal verification tools..."
          java -jar /opt/tla2tools.jar >/dev/null
          coqc --version
          kprove --version
          /opt/dafny/dafny --version
          echo "✅ Tool verification complete"

      - name: Build x3-proof CLI
        run: |
          cargo build -p proof-forge --release --verbose
          test -x target/release/x3-proof
          echo "✅ x3-proof CLI built"

      - name: Run Formal Verification
        id: formal-gate
        run: |
          echo "🔍 Running formal verification proofs..."
          target/release/x3-proof formal --workspace . --strict
        continue-on-error: false

      - name: Generate Formal Verification Report
        if: always()
        run: |
          echo "📊 Generating verification report..."
          target/release/x3-proof formal --workspace . --report > formal-verification-report.txt
          cat formal-verification-report.txt

      - name: Upload Formal Verification Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-verification-report
          path: formal-verification-report.txt
          retention-days: 30

      - name: Check Proof Status
        if: always()
        run: |
          if [ "${{ steps.formal-gate.outcome }}" != "success" ]; then
            echo "❌ FORMAL VERIFICATION FAILED"
            echo ""
            echo "One or more formal proofs did not pass:"
            echo "- TLA+ consensus safety/liveness proofs"
            echo "- Coq supply conservation proofs"
            echo "- K Framework VM determinism proofs"
            echo ""
            echo "See formal-verification-report.txt artifact for details."
            echo ""
            echo "🚨 THIS PR IS BLOCKED - Formal verification must pass before merge."
            exit 1
          else
            echo "✅ FORMAL VERIFICATION PASSED"
            echo "All formal proofs verified successfully!"
          fi

      - name: Comment on PR (On Failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Formal Verification Failed
              
              One or more formal proofs did not pass. This PR is **BLOCKED** until formal verification succeeds.
              
              ### Failed Proofs
              See the [formal-verification-report artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
              
              ### Required Proofs
              - ✅ TLA+ Consensus Safety (no two conflicting blocks finalized)
              - ✅ TLA+ Consensus Liveness (blocks always finalize)
              - ✅ Coq Supply Conservation (total supply = sum of balances)
              - ✅ Coq No Double Mint (minting increases supply exactly once)
              - ✅ K Framework VM Determinism (same input → same output)
              
              ### Next Steps
              1. Review formal proof failures in specs:
                 - \`formal-proofs/tla/X3Consensus.tla\`
                 - \`formal-proofs/coq/SupplyInvariant.v\`
                 - \`formal-proofs/k/x3vm-spec.k\`
              2. Fix the underlying issue (code or spec)
              3. Re-run: \`./target/release/x3-proof formal --workspace . --strict\`
              4. Push fix and re-run CI
              
              **⚠️ Do not bypass this gate - consensus bugs in production = chain halt.**`
            })

      - name: Comment on PR (On Success)
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Formal Verification Passed
              
              All formal proofs verified successfully! Consensus-critical paths are mathematically proven safe.
              
              ### Verified Proofs
              - ✅ TLA+ Consensus Safety
              - ✅ TLA+ Consensus Liveness
              - ✅ Coq Supply Conservation
              - ✅ Coq No Double Mint
              - ✅ K Framework VM Determinism
              
              See the [formal-verification-report artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for proof details.`
            })

  mainnet-gate-integration:
    name: Update Mainnet Gate with Formal Verification
    needs: formal-verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Mark Formal Verification Complete
        run: |
          echo "✅ Formal verification passed - updating mainnet gate status"
          # This would update the mainnet gate tracking file
          # For now, just log success
          echo "formal_verification_status: PASSED" >> mainnet-gate-status.yml

      - name: Commit Status Update
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add mainnet-gate-status.yml || true
          git commit -m "chore: update mainnet gate - formal verification passed" || true
          # git push || true  # Uncomment when ready to auto-commit
