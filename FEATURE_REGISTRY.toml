[atomic_kernel]
mode = "LIVE_TESTNET"
crate_or_service = "pallets/x3-atomic-kernel"
tauri_app = "AtomicLock"
required_tests = [
  "canonical_supply_invariant_holds",
  "represented_total_equals_canonical_supply",
  "pending_supply_returns_to_zero",
  "invariant_break_triggers_economic_halt",
  "halt_blocks_new_mint",
  "halt_blocks_new_transfer",
  "halt_blocks_new_swap",
  "halt_allows_refund",
  "halt_allows_recovery"
]
health_endpoint = "/health/atomic-kernel"
proof_report = "reports/six_route_invariants.md"
readiness_score = 0
blockers = []
dangerous_paths = ["runtime", "pallets/x3-atomic-kernel", "genesis", "tokenomics"]

