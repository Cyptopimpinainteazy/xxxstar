# X3 Feature Matrix
# Comprehensive registry of all X3 blockchain features
# A feature is BUILT only if it has ALL of:
#   1. Registry entry
#   2. Implementation files
#   3. Public API/extrinsic/contract/CLI/UI wiring
#   4. Runtime or app wiring
#   5. Unit tests
#   6. Integration tests
#   7. Negative/failure tests
#   8. Proof receipt (fresh)
#   9. No critical TODO/stub/mock
#   10. Docs updated
#   11. Dashboard/report visibility

features:
  # ============================================================================
  # CORE CHAIN (11 features)
  # ============================================================================
  - id: x3.runtime
    name: X3 Runtime Core
    required_for: mainnet
    criticality: catastrophic
    owner_area: runtime
    docs:
      - runtime/README.md
    code:
      - runtime/src/lib.rs
    wiring:
      - "construct_runtime! macro includes all pallets"
      - "runtime builds and produces WASM"
    tests:
      unit:
        - runtime_compiles
        - runtime_metadata_valid
      integration:
        - runtime_upgrade_works
      negative:
        - runtime_upgrade_without_proof_rejected
    proof_commands:
      - cargo build -p x3-runtime
      - cargo test -p x3-runtime
    built_when:
      - code_exists
      - wired
      - tests_pass
      - no_critical_todos

