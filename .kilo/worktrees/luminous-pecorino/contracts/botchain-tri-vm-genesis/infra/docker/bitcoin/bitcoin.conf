# Bitcoin Core configuration for regtest
# Used for atomic swap testing

# Network
regtest=1
server=1
txindex=1

# RPC settings
rpcuser=botchain
rpcpassword=botchain_test_password
rpcallowip=0.0.0.0/0
rpcbind=0.0.0.0
rpcport=18443

# ZMQ notifications (for real-time updates)
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28333

# Performance
dbcache=512
maxmempool=256

# Wallet
fallbackfee=0.00001
mintxfee=0.00001

# Mining (for regtest)
[regtest]
# Allow mining without peers
connect=0

# Reduce block time for testing
# (blocks can be generated on demand with bitcoin-cli -generate)
