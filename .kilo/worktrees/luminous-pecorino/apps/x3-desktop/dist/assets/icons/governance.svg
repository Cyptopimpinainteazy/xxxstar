  <line x1="64" y1="64" x2="40" y2="80" stroke="#ff3366" stroke-width="2" opacity="0.6"/>
  <line x1="64" y1="64" x2="88" y2="80" stroke="#ff3366" stroke-width="2" opacity="0.6"/>
