# Primary Lane Configuration (Node A)
# Role: Main acceleration path - handles bulk of traffic

lane:
  id: primary
  name: "Primary GPU Lane A"
  role: primary
  priority: 1
  region: us-east-1a
  
hardware:
  gpus:
    count: 4
    model: "NVIDIA A100 80GB"
    memory_per_gpu: "80GB"
    cuda_version: "12.3"
    devices: [0, 1, 2, 3]
    
  cpu:
    model: "AMD EPYC 7763"
    cores: 128
    threads: 256
    
  memory:
    total: "1TB"
    huge_pages: true
    numa_aware: true
    
  storage:
    type: "NVMe SSD RAID10"
    devices: 8
    capacity_per_device: "3.84TB"
    mount_point: "/data/acceleration"
    
  network:
    bandwidth: "200Gbps"
    mtu: 9000
    interfaces:
      - name: eth0
        ip: 10.0.1.10
        role: primary
      - name: eth1
        ip: 10.0.1.11
        role: heartbeat

gpu_config:
  preload_kernels: true
  kernel_dir: "/opt/ccgv/kernels"
  kernels:
    - secp256k1_batch
    - keccak256_batch
    - sha256_batch
    - ed25519_verify
    
  memory_management:
    pinned: true
    preallocate: true
    cache_size: "64GB"
    
  stream_config:
    streams_per_gpu: 32
    async_execution: true
    priority_streams: 8
    
  monitoring:
    nvidia_smi_interval: 1  # seconds
    temperature_threshold: 80  # celsius
    power_limit: 400  # watts
    memory_threshold: 95  # percent

performance:
  target_tps: 20_000_000
  max_latency_ms: 1.0
  batch_size: 10000
  prefetch_batches: 4
  
health_check:
  enabled: true
  interval: 5  # seconds
  endpoints:
    - http://localhost:9000/health
  metrics:
    - gpu_utilization
    - memory_usage
    - kernel_execution_time
    - request_queue_depth
  thresholds:
    gpu_utilization_min: 30  # percent
    memory_usage_max: 95
    kernel_timeout_ms: 50
    queue_depth_max: 10000

failover:
  enabled: true
  health_score_threshold: 0.3
  promotion_targets:
    - shadow
    - tertiary
  demotion_cooldown: 60  # seconds
  
signer:
  mode: "remote"
  authority: "http://signer-service:8080"
  lock_mechanism: "etcd"
  lock_ttl: 30  # seconds
  heartbeat_interval: 5

toll_booth:
  enabled: true
  endpoint: "http://toll-booth:7000"
  sla_enforcement: true
  traffic_shaping: true
  metering: true
  
chains:
  solana:
    enabled: true
    rpc_endpoints:
      - https://api.devnet.solana.com
      - https://api.mainnet-beta.solana.com
    adapter: "svm_validator"
    gpu_acceleration: true
    
  ethereum:
    enabled: true
    rpc_endpoints:
      - https://eth-mainnet.g.alchemy.com/v2/YOUR_KEY
      - https://mainnet.infura.io/v3/YOUR_KEY
    adapter: "evm_validator"
    gpu_acceleration: true
    
  arbitrum:
    enabled: true
    rpc_endpoints:
      - https://arb1.arbitrum.io/rpc
    adapter: "evm_validator"
    gpu_acceleration: true
    
  zksync:
    enabled: true
    rpc_endpoints:
      - https://mainnet.era.zksync.io
    adapter: "evm_validator"
    gpu_acceleration: true

logging:
  level: INFO
  format: json
  output: /var/log/ccgv/primary_lane.log
  rotation:
    max_size: 1GB
    max_age: 7d
    
metrics:
  enabled: true
  port: 9091
  exporters:
    - prometheus
    - json
  flush_interval: 10  # seconds
