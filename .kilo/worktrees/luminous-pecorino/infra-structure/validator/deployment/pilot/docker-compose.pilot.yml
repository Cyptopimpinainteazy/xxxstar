version: "3.9"

# ── X3 Chain – Pilot Docker Compose ──────────────────────────────────────
# Multi-chain X3 GPU validator with dashboard, metrics, and swarm compute

services:

  # ── Redis (shared state / job queue) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Core Validator (Threadripper + 3 GPUs) ────────────────────────────────
  validator-core:
    build:
      context: ../..
      dockerfile: cross-chain-gpu-validator/deployment/Dockerfile
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CCGV_REDIS_URL=redis://redis:6379/0
      - CCGV_REQUIRE_GPU=true
      - CCGV_CONFIG=/app/config/threadripper.toml
      - LD_LIBRARY_PATH=/app/kernels
    volumes:
      - ./threadripper.toml:/app/config/threadripper.toml:ro
      - ../../cross-chain-gpu-validator/kernels/build:/app/kernels:ro
      - pilot-logs:/var/log/x3
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Multi-GPU Scheduler ───────────────────────────────────────────────────
  gpu-scheduler:
    build:
      context: ../..
      dockerfile: cross-chain-gpu-validator/deployment/Dockerfile
    runtime: nvidia
    command: ["python3", "-m", "cross_chain_gpu_validator.gpu.multi_gpu_scheduler"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CCGV_REDIS_URL=redis://redis:6379/0
      - CCGV_CONFIG=/app/config/threadripper.toml
    volumes:
      - ./threadripper.toml:/app/config/threadripper.toml:ro
      - ../../cross-chain-gpu-validator/kernels/build:/app/kernels:ro
    depends_on:
      - validator-core
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Swarm GPU Compute (idle cycle harvester) ──────────────────────────────
  swarm-compute:
    build:
      context: ../..
      dockerfile: cross-chain-gpu-validator/deployment/Dockerfile
    runtime: nvidia
    command: ["python3", "-m", "swarm.gpu_compute.preemptible_scheduler"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CCGV_REDIS_URL=redis://redis:6379/0
      - SWARM_CALLBACK_URL=http://validator-core:8089/swarm/gpu
    volumes:
      - ../../cross-chain-gpu-validator/kernels/build:/app/kernels:ro
    depends_on:
      - validator-core
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Dashboard ─────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ../..
      dockerfile: cross-chain-gpu-validator/deployment/Dockerfile
    command: ["ccgv", "dashboard"]
    environment:
      - CCGV_DASHBOARD_PORT=8080
      - CCGV_REDIS_URL=redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus (metrics) ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - validator-core
    restart: unless-stopped

  # ── Grafana (visualization) ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=x3-pilot
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis-data:
  pilot-logs:
  prometheus-data:
  grafana-data:
