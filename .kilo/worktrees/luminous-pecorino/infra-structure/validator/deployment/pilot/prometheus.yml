global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "x3-validator-core"
    static_configs:
      - targets: ["validator-core:9100"]
        labels:
          node: "threadripper-core-01"
          role: "core"

  - job_name: "x3-gpu-scheduler"
    static_configs:
      - targets: ["gpu-scheduler:9100"]
        labels:
          component: "gpu-scheduler"

  - job_name: "x3-swarm-compute"
    static_configs:
      - targets: ["swarm-compute:9100"]
        labels:
          component: "swarm-compute"

  - job_name: "x3-dashboard"
    static_configs:
      - targets: ["dashboard:8080"]
        labels:
          component: "dashboard"
