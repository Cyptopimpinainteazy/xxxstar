version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  validator:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    environment:
      - CCGV_REDIS_URL=redis://redis:6379/0
      - CCGV_REQUIRE_GPU=true
    depends_on:
      - redis

  dashboard:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: ["ccgv", "dashboard"]
    environment:
      - CCGV_DASHBOARD_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      - redis
