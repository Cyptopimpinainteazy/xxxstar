# Prometheus configuration for CCGV E2E testing environment
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ccgv-testnet'

# Alert rules
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Scrape configurations
scrape_configs:
  # CCGV Validator Service
  - job_name: 'ccgv-validator'
    static_configs:
      - targets: ['ccgv-validator:8000']
    metrics_path: '/metrics.json'
    scrape_interval: 5s
    scrape_timeout: 3s

  # Ethereum RPC Endpoint (anvil)
  - job_name: 'ethereum-testnet'
    static_configs:
      - targets: ['ethereum-testnet:8545']
    metrics_path: '/'
    scrape_interval: 10s

  # Solana RPC Endpoint
  - job_name: 'solana-testnet'
    static_configs:
      - targets: ['solana-testnet:8899']
    metrics_path: '/'
    scrape_interval: 10s

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 5s
