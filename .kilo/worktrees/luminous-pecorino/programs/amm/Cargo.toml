[package]
name = "amm"
version = "0.1.0"
description = "X3 Chain AMM DEX Program for Solana VM"
edition = "2021"
license = "MIT"
repository = "https://github.com/x3-chain/x3-chain"

[lib]
crate-type = ["cdylib", "lib"]
name = "amm"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = { version = "0.29.0", features = ["init-if-needed"] }
anchor-spl = "0.29.0"
