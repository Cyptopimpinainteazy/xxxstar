[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "tests/solidity_contracts/lib", "node_modules"]
test = "contracts"
script = "scripts"

solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

# Fuzz settings — 100 k runs minimum everywhere
[fuzz]
runs = 100000
max_test_rejects = 65536
seed = "0xDEADBEEFCAFEBABE"
dictionary_weight = 40

# Invariant / stateful fuzz
[invariant]
runs = 10000
depth = 500
fail_on_revert = true
call_override = false

# Coverage
[coverage]
enabled = true

# Gas snapshots
[gas_reports]
contracts = ["*"]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
