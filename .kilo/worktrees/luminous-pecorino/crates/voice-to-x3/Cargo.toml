[package]
name = "voice-to-x3"
version = "0.1.0"
edition = "2021"
description = "Voice-to-X3 - Natural language to X3 smart contract code generation"
license = "MIT"
authors = ["X3 Chain Team"]

[features]
default = ["std"]
std = [
    "serde/std",
    "serde_json/std",
]

[dependencies]
# Serialization
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }

# Async
tokio = { version = "1.0", features = ["full", "sync", "time", "rt-multi-thread"] }
async-trait = "0.1"
futures = "0.3"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# UUID
uuid = { version = "1.0", features = ["v4", "serde"] }

# Logging
tracing = "0.1"
log = "0.4"

# Regex for parsing
regex = "1.10"

# HTTP client for AI APIs
reqwest = { version = "0.11", features = ["json"] }

[dev-dependencies]
tokio-test = "0.4"
