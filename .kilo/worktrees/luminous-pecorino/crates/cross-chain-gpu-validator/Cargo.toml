[package]
name = "cross-chain-gpu-validator"
version = "0.1.0"
edition = "2021"

[dependencies]
# Crypto and hashing
sha3 = "0.10"
k256 = { version = "0.13", features = ["ecdsa"] }
ecdsa = { version = "0.16" }

# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Redis for atomic registry - Phase 2 upgrade
redis = { version = "0.32.7", features = ["aio", "tokio-comp"] }

# Logging
log = "0.4"
tracing = "0.1"
tracing-subscriber = { workspace = true, features = ["env-filter"] }

# Error handling
thiserror = "1"

# Time and dates
chrono = { version = "0.4", features = ["serde"] }

# Metrics and observability
prometheus = "0.13"

# HTTP for RPC calls
reqwest = { version = "0.11", features = ["json"] }

# Hex encoding
hex = "0.4"

# Workspace integrations
x3-gpu-validator-swarm = { path = "../x3-gpu-validator-swarm" }

# Benchmarking
criterion = "0.5"

# Test utilities
mockall = "0.12"

# Random for testing
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"

[[bin]]
name = "cross-chain-gpu-validator"
path = "src/main.rs"

[[bench]]
name = "gpu_kernels"
harness = false
