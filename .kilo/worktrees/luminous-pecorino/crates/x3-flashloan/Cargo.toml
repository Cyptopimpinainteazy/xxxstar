[package]
name = "x3-flashloan"
version = "0.1.0"
edition = "2021"
description = "X3 cross-chain flashloan engine — transient execution capital with atomic settlement"
license = "MIT"
authors = ["X3 Protocol"]

[dependencies]
x3-proof = { path = "../x3-proof" }
x3-slash = { path = "../x3-slash" }
x3-fees = { path = "../x3-fees" }
x3-intent = { path = "../x3-intent" }

serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
hex = "0.4"
thiserror = "1.0"

[dev-dependencies]
x3-court = { path = "../x3-court" }
