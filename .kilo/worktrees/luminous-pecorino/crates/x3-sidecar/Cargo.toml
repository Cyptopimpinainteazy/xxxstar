[package]
name = "x3-sidecar"
version = "0.1.0"
edition = "2021"
description = "X3 Sidecar Daemon - Off-chain swarm execution node for X3 Chain"
authors = ["X3 Chain Team"]
license = "MIT"
repository = "https://github.com/x3-chain/x3-chain"
default-run = "x3-sidecar"

[[bin]]
name = "x3-sidecar"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# Networking
reqwest = { version = "0.11", features = ["json"] }
hyper = { version = "0.14", features = ["full"] }
axum = "0.6"
tower = "0.4"
tower-http = { version = "0.4", features = ["cors", "trace"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Crypto
blake2 = "0.10"
sha2 = "0.10"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
rand = "0.8"
hex = "0.4"

# Storage
# rocksdb = { version = "0.24", optional = true } # TEMPORARILY DISABLED: version conflict with polkadot-sdk
sled = "0.34"

# Metrics & logging
tracing = "0.1"
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
prometheus = "0.14.0"
metrics = "0.21"
metrics-exporter-prometheus = "0.12"

# Utils
thiserror = "1.0"
anyhow = "1.0"
parking_lot = "0.12"
dashmap = "6.0"
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
toml = "0.8"
config = "0.13"
clap = { version = "4.4", features = ["derive", "env"] }

# X3 integration
x3-vm = { path = "../x3-vm" }
x3-common = { path = "../x3-common" }
x3-rpc = { path = "../x3-rpc" }
x3-orchestra-control-plane = { path = "../x3-orchestra-control-plane" }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.9"
wiremock = "0.5"
httpmock = "0.7"
reqwest = { version = "0.11", features = ["json"] }
tokio-postgres = "0.7"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono", "uuid"] }
uuid = { version = "1.6", features = ["v4", "serde"] }

[features]
default = []
# rocksdb-storage = ["rocksdb"] # TEMPORARILY DISABLED: version conflict with polkadot-sdk
gpu-accel = []
