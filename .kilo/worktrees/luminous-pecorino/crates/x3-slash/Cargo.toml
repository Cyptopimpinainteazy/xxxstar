[package]
name = "x3-slash"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "X3 Slashing Engine — automatic, deterministic punishment for protocol violations"

[dependencies]
x3-proof = { path = "../x3-proof", default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
thiserror = "1.0"

[dev-dependencies]

[features]
default = ["std"]
std = [
    "x3-proof/std",
    "serde/std",
]
