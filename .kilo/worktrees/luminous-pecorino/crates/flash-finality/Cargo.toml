[package]
name = "x3-flash-finality"
version = "0.1.0"
edition = "2021"
description = "Flash Finality gadget — HotStuff-inspired sub-second finality running in shadow mode alongside GRANDPA"
license = "Apache-2.0"

[dependencies]
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
parity-scale-codec = { version = "3.6", default-features = false, features = ["derive"] }
futures = "0.3"
# Async runtime
tokio = { version = "1", features = ["full"] }
# Crypto
sha2 = "0.10"
hex = "0.4"
# Observability
tracing = "0.1"
# Error handling
anyhow = "1"
thiserror = "1"
sp-core = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
