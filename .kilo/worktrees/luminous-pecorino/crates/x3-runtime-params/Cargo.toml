[package]
name = "x3-runtime-params"
version = "0.1.0"
edition = "2021"
description = "X3 Chain Runtime Parameters - Block weights, gas limits, and network tuning"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
parking_lot = "0.12"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"

[features]
default = ["std"]
std = []