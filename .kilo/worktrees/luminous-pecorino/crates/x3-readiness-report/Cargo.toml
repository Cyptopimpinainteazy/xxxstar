[package]
name = "x3-readiness-report"
version = "0.4.0"
edition = "2021"
license = "Apache-2.0"
authors = ["X3 Team"]
description = "Production readiness reporting for X3 Atomic Star v0.4"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
ureq = { version = "2.10", features = ["json"] }

