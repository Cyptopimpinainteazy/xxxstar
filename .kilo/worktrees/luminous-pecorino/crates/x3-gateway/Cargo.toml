[package]
name = "x3-gateway"
version = "0.1.0"
edition = "2021"
description = "REST and GraphQL API gateway for X3 Chain indexed data"
authors = ["X3 Chain Team"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/x3-chain/x3-chain"
keywords = ["blockchain", "api", "graphql", "rest"]
categories = ["web-programming::http-server", "asynchronous"]

[[bin]]
name = "x3-gateway"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["rt-multi-thread", "macros", "signal"] }

# Web framework
axum = { version = "0.8", features = ["macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "compression-gzip"] }

# GraphQL
async-graphql = { version = "7.0", features = ["chrono", "uuid"] }
async-graphql-axum = "7.0"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono", "uuid"] }
redis = { version = "0.32.7", features = ["aio", "tokio-comp"] }

# Serialization
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = "1.0"

# CLI
clap = { workspace = true, features = ["derive", "env"] }

# Logging
tracing = "0.1"
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Configuration
config = "0.14"
dotenvy = "0.15"
x3-rpc = { path = "../x3-rpc" }
x3-orchestra-control-plane = { path = "../x3-orchestra-control-plane" }

# Utilities
uuid = { version = "1.7", features = ["serde", "v4"] }

[dev-dependencies]
hyper = { version = "1", features = ["client", "http1"] }
reqwest = { version = "0.11", features = ["json"] }
tokio-test = "0.4"
tower = { version = "0.5", features = ["util"] }
proptest = "1.4"
loom = "0.7"

[features]
default = []
loom-tests = []
