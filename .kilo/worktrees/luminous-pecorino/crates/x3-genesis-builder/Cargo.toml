[package]
name = "x3-genesis-builder"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Deterministic genesis manifest builder for X3"

[lib]
path = "src/lib.rs"

[[bin]]
name = "x3-genesis-builder"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
thiserror = "1.0"
