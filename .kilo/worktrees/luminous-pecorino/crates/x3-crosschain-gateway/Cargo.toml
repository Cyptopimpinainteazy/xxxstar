[package]
name = "x3-crosschain-gateway"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "External asset gateway core for X3 proof-verified lock/mint and burn/release flows."

[lib]
name = "x3_crosschain_gateway"
path = "src/lib.rs"

[dependencies]
x3-circuit-breaker = { path = "../x3-circuit-breaker" }
x3-external-route-registry = { path = "../x3-external-route-registry" }
x3-gateway-indexer = { path = "../x3-gateway-indexer" }
x3-gateway-insurance = { path = "../x3-gateway-insurance" }
x3-gateway-risk-engine = { path = "../x3-gateway-risk-engine" }
x3-proof-dispute = { path = "../x3-proof-dispute" }
x3-proof-envelope = { path = "../x3-proof-envelope" }
x3-validator-attestation = { path = "../x3-validator-attestation" }
x3-verification-router = { path = "../x3-verification-router" }
x3-asset-kernel-types = { path = "../x3-asset-kernel-types", default-features = false, features = ["std"] }
