[package]
name = "apotheosis-tx"
version = "0.1.0"
edition = "2021"
description = "Apotheosis Transaction - Ultimate cross-chain asset migration for X3 Chain"
license = "MIT"
authors = ["X3 Chain Team"]

[features]
default = ["std"]
std = ["serde/std"]

[dependencies]
# Serialization
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Async runtime
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"

# Cryptographic primitives
sha3 = "0.10"
blake3 = "1.5"

# Encoding
hex = "0.4"
base64 = "0.22"

# Timestamp
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = "0.1"
log = "0.4"

# Random
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"
