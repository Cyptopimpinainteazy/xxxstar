[package]
name = "x3-staking-analytics"
version = "1.0.0"
edition = "2021"
description = "X3 Staking Analytics and Dashboard Backend"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
