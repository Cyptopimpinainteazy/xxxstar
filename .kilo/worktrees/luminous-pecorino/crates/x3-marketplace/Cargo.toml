[package]
name = "x3-marketplace"
version = "1.0.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
sp-core = "21"
sp-runtime = "27"
pallet-balances = "27"
frame-support = "27"
frame-system = "27"
codec = { package = "parity-scale-codec", version = "3", features = ["derive"] }
scale-info = { version = "2", features = ["derive"] }
thiserror = "1"
sha2 = "0.10"
hex = "0.4"

[[dev-dependencies.tokio-test]]
version = "0.4"

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "serde/std",
    "sp-core/std",
    "sp-runtime/std",
]
