[package]
name = "x3-proving-harness"
version = "0.1.0"
edition = "2021"
description = "Unified testnet proving pipeline — runs all Phase 1 checks and emits a compatibility scorecard"

[[bin]]
name = "x3-prove"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"
reqwest = { version = "0.12", features = ["json"] }
