[package]
name = "pallet-svm"
version = "0.1.0"
edition = "2021"
authors = ["X3 Chain Core Engineering <engineering@x3-chain.io>"]
license = "Apache-2.0"
description = "Solana Virtual Machine (SVM) pallet for X3 Chain - provides program deployment, account storage, and BPF execution"
repository = "https://github.com/x3-chain/core"

[dependencies]
parity-scale-codec = { version = "3.6", default-features = false, features = ["derive", "max-encoded-len"] }
scale-info = { version = "2.10", default-features = false, features = ["derive"] }
log = { version = "0.4", default-features = false }

# Substrate dependencies
frame-support = { workspace = true, default-features = false }
frame-system = { workspace = true, default-features = false }
sp-core = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }
sp-io = { workspace = true, default-features = false }

# SVM integration for BPF execution
x3-svm-integration = { path = "../../crates/svm-integration", default-features = false }

[dev-dependencies]
sp-core = { workspace = true, features = ["std"] }
sp-io = { workspace = true, features = ["std"] }
sp-runtime = { workspace = true, features = ["std"] }
pallet-balances = { workspace = true, features = ["std"] }

[features]
default = ["std"]
std = [
    "parity-scale-codec/std",
    "scale-info/std",
    "log/std",
    "frame-support/std",
    "frame-system/std",
    "sp-core/std",
    "sp-std/std",
    "sp-runtime/std",
    "sp-io/std",
    "x3-svm-integration/std",
]
runtime-benchmarks = [
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
]
try-runtime = [
    "frame-support/try-runtime",
    "frame-system/try-runtime",
]
