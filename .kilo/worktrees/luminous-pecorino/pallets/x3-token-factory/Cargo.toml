[package]
name = "pallet-x3-token-factory"
version = "0.1.0"
authors = ["X3 Chain Core Team <core@x3-chain.io>"]
description = "X3 OmniToken Factory — permissionless extrinsic to launch one canonical token native across X3Native, X3Evm, and X3Svm. Consumes x3-asset-registry and x3-supply-ledger via trait-typed config; never bypasses the Universal Asset Kernel invariant."
edition = "2021"
license = "Apache-2.0"
publish = false

[lib]
crate-type = ["rlib"]

[dependencies]
frame-support = { workspace = true, default-features = false }
frame-system = { workspace = true, default-features = false }
parity-scale-codec = { workspace = true, default-features = false, features = ["derive", "max-encoded-len"] }
scale-info = { workspace = true, default-features = false, features = ["derive"] }
sp-core = { workspace = true, default-features = false }
sp-io = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }
serde = { workspace = true, optional = true, features = ["derive"] }

x3-asset-kernel-types = { path = "../../crates/x3-asset-kernel-types", default-features = false }

[dev-dependencies]
sp-core = { workspace = true, default-features = false, features = ["std"] }
sp-io = { workspace = true, default-features = false, features = ["std"] }
sp-runtime = { workspace = true, default-features = false, features = ["std"] }
pallet-x3-asset-registry = { path = "../x3-asset-registry", default-features = false, features = ["std"] }
pallet-x3-supply-ledger = { path = "../x3-supply-ledger", default-features = false, features = ["std"] }
pallet-x3-cross-vm-router = { path = "../x3-cross-vm-router", default-features = false, features = ["std"] }

[features]
default = ["std"]
std = [
    "frame-support/std",
    "frame-system/std",
    "parity-scale-codec/std",
    "scale-info/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "sp-std/std",
    "serde",
    "serde/std",
    "x3-asset-kernel-types/std",
]
try-runtime = [
    "frame-support/try-runtime",
    "frame-system/try-runtime",
]
