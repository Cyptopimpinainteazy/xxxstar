# X3 Critical Invariants Registry
# Every invariant below MUST have passing tests before mainnet
# No test = P0 blocker
# P0 invariants are release gates - they cannot be deferred

invariants:
  # ═══════════════════════════════════════════════════════════════════════════════
  # P0 INVARIANTS: Must pass before mainnet launch (HARD GATES)
  # ═══════════════════════════════════════════════════════════════════════════════

  - id: canonical_supply_conservation
    severity: P0
    category: asset_kernel
    statement: |
      The canonical supply equals the sum of:
      native ledger + EVM ledger + SVM ledger + 
      external bridge locked + pending cross-VM operations
      
      canonical_supply = sum(all_ledgers) always
    rationale: |
      If supply is not conserved, we can inflate or deflate the asset
      without actual mint/burn. This breaks the tokenomics entirely.
    required_tests:
      - canonical_supply_roundtrip
      - mint_conserves_supply
      - burn_conserves_supply
      - bridge_lock_conserves_supply
      - bridge_unlock_conserves_supply
      - failed_swap_conserves_supply
      - token_transfer_conserves_supply
    test_files:
      - pallets/x3-supply-ledger/src/tests_s0_1.rs
      - crates/x3-bridge/tests/test_supply_conservation.rs
    commands:
      - cargo test -p pallet-x3-supply-ledger canonical_supply
      - cargo test -p x3-bridge test_supply_conservation
    blocker_if_missing: "Canonical supply not tested = cannot launch"

  - id: atomic_all_or_nothing
    severity: P0
    category: atomic_execution
    statement: |
      A cross-VM atomic operation must settle completely or rollback completely.
      
      There is NO state where:
      - Collateral is locked but swap failed
      - Assets transferred but not confirmed
      - One leg settled, other leg failed
      
      All-or-nothing is atomic. Anything else is a stableswap exploit.
    rationale: |
      If we can get to a state where one leg settles and the other doesn't,
      attackers can drain the bridge by intentionally failing their leg.
    required_tests:
      - atomic_swap_success_full_settle
      - atomic_swap_failure_full_rollback
      - atomic_swap_remote_failure_refunds_collateral
      - atomic_swap_timeout_after_1hr_refunds
      - atomic_swap_partial_settlement_impossible
      - atomic_swap_duplicate_nonce_rejects
    test_files:
      - crates/x3-atomic-trade/tests/test_atomic_all_or_nothing.rs
      - crates/x3-atomic-trade/tests/test_rollback.rs
    commands:
      - cargo test -p x3-atomic-trade atomic.*all_or_nothing
      - cargo test -p x3-atomic-trade atomic.*rollback
    blocker_if_missing: "Atomic all-or-nothing not tested = cannot launch"

  - id: bridge_replay_impossible
    severity: P0
    category: bridge
    statement: |
      A bridge message CANNOT be executed twice.
      
      Each message has a unique (chain_id, nonce, message_hash) tuple.
      Executing the same message twice is impossible.
    rationale: |
      If we can replay a bridge message, attackers can:
      - Replay a lock to double-lock collateral
      - Replay a settle to drain the bridge
      - Replay any message after a restart
    required_tests:
      - replay_same_nonce_rejected
      - replay_same_message_hash_rejected
      - replay_after_validator_restart_rejected
      - replay_with_modified_nonce_rejected
      - replay_cross_chain_id_rejected
    test_files:
      - crates/x3-bridge/tests/test_replay_protection.rs
    commands:
      - cargo test -p x3-bridge replay
      - ./scripts/testnet-replay-after-restart.sh
    blocker_if_missing: "Bridge replay protection not tested = cannot launch"

  - id: atomic_timeout_recovery
    severity: P0
    category: atomic_execution
    statement: |
      If a cross-VM swap does not settle within 1 hour, both legs rollback automatically.
      Collateral returns to the initiator.
      
      No manual intervention required. Timeout is guaranteed.
    rationale: |
      Without timeout recovery, a failed remote VM could lock collateral forever.
      Timeout MUST be automatic and enforced in code.
    required_tests:
      - timeout_after_1hr_triggers_rollback
      - timeout_returns_collateral_to_sender
      - timeout_cannot_be_cancelled
      - timeout_triggers_even_if_remote_silent
    test_files:
      - crates/x3-atomic-trade/tests/test_timeout.rs
    commands:
      - cargo test -p x3-atomic-trade test_timeout
    blocker_if_missing: "Atomic timeout recovery not tested = cannot launch"

  - id: no_panic_unwrap_expect_in_critical_paths
    severity: P0
    category: runtime
    statement: |
      Critical extrinsics and consensus-critical code MUST NOT panic.
      
      No panic!, unwrap(), expect() that could crash the validator.
      All fallible operations return Result<T, E>.
    rationale: |
      If a validator panics during block production, the chain stalls.
      Production hazards must be scanned and eliminated.
    required_tests:
      - scan_for_production_hazards
      - critical_paths_return_result
      - no_expect_in_runtime_extrinsics
      - no_panic_in_consensus
    test_files:
      - launch-gates/hazard-scan.sh
    commands:
      - rg -l "panic!|unwrap\(|expect\(" crates/x3-* pallets/x3-* runtime/ | grep -v test
    blocker_if_missing: "Production hazards not scanned = cannot launch"

  - id: bridge_state_consistency
    severity: P0
    category: bridge
    statement: |
      Bridge state is consistent across VM boundaries:
      - Every locked message has a corresponding unlock transaction
      - Unlock queue cannot exceed lock queue
      - No message exists in pending without a nonce slot
      - All pending messages have a timeout
    rationale: |
      If bridge state diverges between VMs, we lose consensus.
      State consistency is non-negotiable.
    required_tests:
      - bridge_state_consistency_after_operations
      - unlock_cannot_exceed_lock
      - all_pending_have_timeout
      - no_orphaned_messages
    test_files:
      - crates/x3-bridge/tests/test_state_consistency.rs
    commands:
      - cargo test -p x3-bridge state_consistency
    blocker_if_missing: "Bridge state consistency not tested = cannot launch"

  - id: runtime_benchmark_weights_exist
    severity: P0
    category: runtime
    statement: |
      Every critical extrinsic has a benchmark that produces runtime weights.
      
      No extrinsic can have a hardcoded weight.
      All weights generated from actual benchmarks.
    rationale: |
      Without proper weights, validators can be DoS'd by expensive extrinsics.
      Weights MUST be derived from benchmarks, not guesses.
    required_tests:
      - all_critical_extrinsics_benchmarked
      - benchmark_weights_exist
      - weights_committed_in_runtime
    test_files:
      - runtime/src/weights.rs
      - benches/extrinsic_weights.rs
    commands:
      - cargo run --release --features runtime-benchmarks -- benchmark
      - ls -la runtime/src/weights/ | grep "*.rs"
    blocker_if_missing: "Benchmark weights not generated = cannot launch"

  # ═══════════════════════════════════════════════════════════════════════════════
  # P1 INVARIANTS: Should pass before launch (high priority)
  # ═══════════════════════════════════════════════════════════════════════════════

  - id: dex_reserve_invariant
    severity: P1
    category: dex
    statement: |
      DEX pool reserves always equal token_a_minted + token_b_minted - token_a_withdrawn - token_b_withdrawn
      
      Reserve formula: r_a * r_b = k (constant product)
      No dust or rounding errors accumulate.
    rationale: |
      If DEX reserves diverge from expected values, liquidity providers lose money
      and AMM pricing becomes incorrect.
    required_tests:
      - dex_reserve_after_swap_correct
      - dex_reserve_after_liquidity_add_correct
      - dex_reserve_after_liquidity_remove_correct
      - dex_reserve_rounding_error_minimal
    test_files:
      - pallets/x3-dex-router/tests/test_reserve_invariant.rs
    commands:
      - cargo test -p x3-dex-router reserve_invariant
    blocker_if_missing: "DEX reserve invariant not tested"

  - id: slashing_consistency
    severity: P1
    category: validator_ops
    statement: |
      Slashing is deterministic and consistent.
      A validator slashed on one node is slashed on all nodes for the same offense.
      Slashing cannot be applied twice for the same offense.
    rationale: |
      Inconsistent slashing breaks validator incentives and trust.
    required_tests:
      - slashing_applied_deterministically
      - slashing_not_applied_twice
      - slashing_consistent_across_nodes
    test_files:
      - pallets/pallet-session/tests/test_slashing.rs
    commands:
      - cargo test -p pallet-session slashing
    blocker_if_missing: "Slashing not tested"

  # ═══════════════════════════════════════════════════════════════════════════════
  # P2 INVARIANTS: Nice to have, can be addressed post-launch
  # ═══════════════════════════════════════════════════════════════════════════════

  - id: governance_voting_fairness
    severity: P2
    category: governance
    statement: |
      Governance votes are fair and cannot be manipulated.
      All voters have equal weight per token.
      Vote tallying is deterministic.
    rationale: |
      Voting fairness is important for long-term governance health.
    required_tests:
      - voting_weight_proportional_to_tokens
      - vote_tallying_deterministic
      - vote_cannot_be_changed_after_voting_period
    test_files:
      - pallets/x3-governance/tests/test_voting.rs
    commands:
      - cargo test -p x3-governance voting
    blocker_if_missing: "Governance voting not tested (P2)"

# ═══════════════════════════════════════════════════════════════════════════════
# INVARIANT TESTING RULES
# ═══════════════════════════════════════════════════════════════════════════════

testing_rules:
  - rule: "P0 invariant without test = P0 blocker"
    triggers_hard_fail: true
    
  - rule: "P0 invariant with failing test = RELEASE FREEZE"
    triggers_hard_fail: true
    
  - rule: "P1 invariant without test = P1 blocker"
    can_defer: false
    
  - rule: "P2 invariant without test = acceptable for testnet"
    can_defer: true

# ═══════════════════════════════════════════════════════════════════════════════
# MONITORING RULES (for mainnet ops)
# ═══════════════════════════════════════════════════════════════════════════════

monitoring:
  - invariant_id: canonical_supply_conservation
    monitor_metric: "canonical_supply_balance"
    alert_threshold: "1% divergence"
    alert_severity: "CRITICAL"
    
  - invariant_id: bridge_replay_impossible
    monitor_metric: "bridge_replay_attempts_rejected"
    alert_threshold: "any replay attempt"
    alert_severity: "CRITICAL"
    
  - invariant_id: atomic_all_or_nothing
    monitor_metric: "atomic_swaps_in_bad_state"
    alert_threshold: "any occurrence"
    alert_severity: "CRITICAL"
    
  - invariant_id: no_panic_unwrap_expect_in_critical_paths
    monitor_metric: "validator_panic_count"
    alert_threshold: "any panic"
    alert_severity: "CRITICAL"
    
  - invariant_id: dex_reserve_invariant
    monitor_metric: "dex_reserve_error_pct"
    alert_threshold: "0.1% divergence"
    alert_severity: "HIGH"
