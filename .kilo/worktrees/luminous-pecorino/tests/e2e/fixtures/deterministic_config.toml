# Deterministic E2E Test Configuration
# This file defines environment variables and settings for deterministic test runs
# ensuring reproducible blockchain state across multiple runs.

[environment]
# Deterministic seed for RNG initialization (used by runtime for pseudo-random selections)
deterministic_seed = "0x1234567890abcdef1234567890abcdef"

# Genesis timestamp (unix seconds) - locked to ensure same parent hashes
genesis_timestamp = 1707340800  # Feb 8, 2025 00:00:00 UTC

# Chain-specific parameters
[chain]
# Number of validators (fixed)
num_validators = 3

# Session length in blocks (fixed)
session_length = 6

# Block time (milliseconds, fixed)
block_time_ms = 6000

# Gas limit per block (fixed)
gas_limit_per_block = 8000000

# Finality depth (number of blocks for finality)
finality_depth = 2

[consensus]
# Aura slot duration (milliseconds, fixed for consensus)
aura_slot_duration_ms = 6000

# Proof of authority - use deterministic validator selection
use_poa = true

# Deterministic validator keys (derived from fixed seed above)
validator_seed_prefix = "validator"

[storage]
# Base path for test node state
base_path = "/tmp/x3-e2e-deterministic"

# Wipe state on startup to ensure clean slate
wipe_on_startup = true

# Use in-memory storage if available (speeds up deterministic runs)
memory_storage = false

[logging]
# Log level for node (off, error, warn, info, debug, trace)
log_level = "info"

# Enable structured logging for artifact collection
structured_logging = true

# Emit determinism-related diagnostics
diagnostic_mode = true
