[package]
name = "sp-state-machine"
version = "0.28.0"
authors = ["Parity Technologies <admin@parity.io>"]
description = "Substrate State Machine"
edition = "2021"
license = "Apache-2.0"
homepage = "https://substrate.io"
repository = "https://github.com/paritytech/substrate/"
documentation = "https://docs.rs/sp-state-machine"
readme = "README.md"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { package = "parity-scale-codec", version = "3.6.1", default-features = false }
hash-db = { version = "0.16.0", default-features = false }
log = { version = "0.4.17", default-features = false }
parking_lot = { version = "0.12.1", optional = true }
rand = { version = "0.8.5", optional = true }
smallvec = "1.8.0"
thiserror = { version = "1.0.30", optional = true }
tracing = { version = "0.1.29", optional = true }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk", tag = "polkadot-stable2512", default-features = false }
sp-externalities = { git = "https://github.com/paritytech/polkadot-sdk", tag = "polkadot-stable2512", default-features = false }
sp-panic-handler = { git = "https://github.com/paritytech/polkadot-sdk", tag = "polkadot-stable2512", optional = true }
sp-std = { git = "https://github.com/paritytech/polkadot-sdk", tag = "polkadot-stable2512", default-features = false }
sp-trie = { version = "22.0.0", default-features = false, path = "../sp-trie" }
trie-db = { version = "0.28.0", default-features = false }

[dev-dependencies]
array-bytes = "6.1"
pretty_assertions = "1.2.1"
rand = "0.8.5"
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk", tag = "polkadot-stable2512" }
assert_matches = "1.5"

[features]
default = ["std"]
std = [
	"codec/std",
	"hash-db/std",
	"log/std",
	"parking_lot",
	"rand",
	"sp-core/std",
	"sp-externalities/std",
	"sp-panic-handler",
	"sp-std/std",
	"sp-trie/std",
	"trie-db/std",
	"thiserror",
	"tracing",
]
