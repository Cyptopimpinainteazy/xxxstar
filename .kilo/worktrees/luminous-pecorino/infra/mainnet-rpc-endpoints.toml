# X3 Chain Mainnet RPC Endpoints Configuration
# This file defines production RPC endpoints for cross-chain operations

[solana]
# Primary Solana mainnet RPC endpoints via DRPC
websocket = "wss://lb.drpc.live/solana/ArgUBy0RzURpos-Jlz1TqLRxbgscV2AR8JXZrqRhf0fE"
http = "https://lb.drpc.live/solana/ArgUBy0RzURpos-Jlz1TqLRxbgscV2AR8JXZrqRhf0fE"

# Endpoint metadata
provider = "DRPC"
network = "mainnet-beta"
cluster_id = 1  # Solana mainnet cluster ID

# Connection settings
max_retries = 3
timeout_ms = 30000
rate_limit_per_second = 100

[solana.fallback]
# Fallback endpoints (to be configured)
# websocket = "wss://api.mainnet-beta.solana.com"
# http = "https://api.mainnet-beta.solana.com"

[ethereum]
# Ethereum mainnet endpoints (to be configured when needed)
# websocket = "wss://mainnet.infura.io/ws/v3/${INFURA_PROJECT_ID}"
# http = "https://mainnet.infura.io/v3/${INFURA_PROJECT_ID}"
provider = "Infura"
network = "mainnet"
chain_id = 1

[bridge]
# Bridge configuration for cross-VM operations
enabled = true
min_confirmations = 32  # Solana confirmations before bridging
max_tx_size_bytes = 1232  # Solana transaction size limit

[monitoring]
# Health check and monitoring settings
health_check_interval_seconds = 60
alert_on_failure = true
metrics_enabled = true
