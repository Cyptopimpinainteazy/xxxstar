{{- if .Values.coordinator.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gpu-swarm.fullname" . }}-coordinator
  labels:
    {{- include "gpu-swarm.labels" . | nindent 4 }}
    component: coordinator
spec:
  serviceName: {{ include "gpu-swarm.fullname" . }}-coordinator
  replicas: {{ .Values.coordinator.replicas }}
  selector:
    matchLabels:
      {{- include "gpu-swarm.selectorLabels" . | nindent 6 }}
      component: coordinator
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gpu-swarm.selectorLabels" . | nindent 8 }}
        component: coordinator
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gpu-swarm.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: coordinator
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.coordinator.image.repository }}:{{ .Values.coordinator.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.coordinator.image.pullPolicy }}
        ports:
        - name: p2p
          containerPort: 9000
          protocol: TCP
        - name: rpc
          containerPort: 9100
          protocol: TCP
        - name: admin
          containerPort: 3000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info,gpu_swarm=debug"
        - name: COORDINATOR_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: BLOCKCHAIN_RPC
          value: {{ .Values.blockchain.rpcEndpoint | quote }}
        - name: NETWORK_MAX_PEERS
          value: {{ .Values.network.maxPeers | quote }}
        livenessProbe:
          httpGet:
            path: /health
            port: admin
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: admin
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.coordinator.resources | nindent 12 }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/swarm
        - name: config
          mountPath: /etc/swarm
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: {{ include "gpu-swarm.fullname" . }}-coordinator-config
      {{- if .Values.coordinator.persistence.enabled }}
      volumeClaimTemplates:
      - metadata:
          name: data
        spec:
          accessModes: ["ReadWriteOnce"]
          {{- if .Values.coordinator.persistence.storageClass }}
          storageClassName: {{ .Values.coordinator.persistence.storageClass }}
          {{- end }}
          resources:
            requests:
              storage: {{ .Values.coordinator.persistence.size | quote }}
      {{- else }}
      dummyVolume:
        name: data
        emptyDir: {}
      {{- end }}
{{- end }}
