firewall_policy:
  ssh:
    port: 22
    protocol: tcp
    source: operator-source-ips-only
  p2p:
    port: 30333
    protocol: tcp
    source: validator-peers-and-approved-seeds
  rpc:
    port: 9944
    protocol: tcp
    source: public-only-on-rpc-hosts
  metrics:
    port: 9615
    protocol: tcp
    source: vpn-or-management-network-only
  grafana:
    port: 3000
    protocol: tcp
    source: vpn-or-management-network-only

