public_testnet_minimum:
  authorities:
    - logical_name: validator-01
      host_id: x3-lab-val-01
      site: local-site
      role: validator
      ssh_user: null
      public_ip: null
      notes:
        - Keep only if local power and connectivity are stable.
    - logical_name: validator-02
      host_id: remote-vps-a
      site: remote-site-a
      role: validator
      ssh_user: null
      public_ip: null
      notes:
        - Far-away VPS can fit here if it meets CPU, RAM, storage, and network requirements.
    - logical_name: validator-03
      host_id: remote-vps-b
      site: remote-site-b
      role: validator
      ssh_user: null
      public_ip: null
      notes:
        - Must be a second remote site, not the same region as remote-vps-a.

  non_authority_nodes:
    - logical_name: seed-01
      host_id: x3-lab-val-02
      site: local-site
      role: non-authority bootnode or spare validator
      ssh_user: null
