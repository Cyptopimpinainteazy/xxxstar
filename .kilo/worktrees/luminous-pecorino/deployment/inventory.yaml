  - Confirm CPU model, RAM size, storage type, and NIC speed for the DL380p and R710.
  - Confirm the Xserve can still run a supported OS and stable storage stack.
  - Fill in ssh_user and real management or public addresses for every host in use.
  - Confirm which remote VPS hosts will carry validator-02 and validator-03 for public testnet.
