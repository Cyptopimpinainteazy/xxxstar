# X3 Chain Prometheus Configuration
# Scrape intervals and targets for monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'x3-chain-testnet'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Rule files
# rule_files:
#   - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          component: 'prometheus'

  # X3 Chain Bootnode
  - job_name: 'x3-bootnode'
    static_configs:
      - targets: ['bootnode:9615']
        labels:
          node_type: 'bootnode'
          network: 'testnet'

  # X3 Chain Validators
  - job_name: 'x3-validators'
    static_configs:
      - targets:
          - 'validator-01:9615'
          - 'validator-02:9615'
          - 'validator-03:9615'
        labels:
          node_type: 'validator'
          network: 'testnet'
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.+):9615'
        target_label: instance
        replacement: '${1}'

  # Analytics Service
  - job_name: 'x3-analytics'
    static_configs:
      - targets: ['analytics:8080']
        labels:
          component: 'analytics'
    metrics_path: '/metrics'

  # PostgreSQL Exporter (if running)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          component: 'database'

  # RPC Gateway (Nginx)
  - job_name: 'rpc-gateway'
    static_configs:
      - targets: ['rpc-gateway:9113']
        labels:
          component: 'gateway'

# Substrate-specific metrics relabeling
# Substrate exposes metrics at /metrics endpoint on port 9615
