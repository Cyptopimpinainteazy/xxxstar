apiVersion: v1
kind: Namespace
metadata:
  name: gpu-swarm
  labels:
    name: gpu-swarm

---
# ConfigMap for swarm configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: swarm-config
  namespace: gpu-swarm
data:
  coordinator.yaml: |
    quorum_size: 3
    consensus_timeout: 30s
    task_timeout: 300s
    verification_threshold: 0.95
    
  node.yaml: |
    gpu_backends:
      - cuda
      - rocm
    memory_pooling_enabled: true
    memory_pool_size: 40GB
    task_batch_size: 32
    batch_timeout: 1s

---
# ConfigMap for monitoring
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-config
  namespace: gpu-swarm
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    
    scrape_configs:
      - job_name: 'gpu-swarm'
        static_configs:
          - targets: ['localhost:9090']
  
  grafana-dashboards.json: |
    {
      "dashboards": [
        {
          "name": "GPU Swarm - Overview"
        }
      ]
    }

---
# StatefulSet for Swarm Coordinator (High Availability)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: swarm-coordinator
  namespace: gpu-swarm
spec:
  serviceName: swarm-coordinator
  replicas: 3
  selector:
    matchLabels:
      app: swarm-coordinator
  template:
    metadata:
      labels:
        app: swarm-coordinator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - swarm-coordinator
              topologyKey: kubernetes.io/hostname
      
      containers:
      - name: coordinator
        image: x3-chain/gpu-swarm-coordinator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9000
          name: api
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        - containerPort: 9091
          name: rpc
          protocol: TCP
        
        env:
        - name: COORDINATOR_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: LOG_LEVEL
          value: "info"
        - name: JAEGER_HOST
          value: "jaeger.gpu-swarm.svc.cluster.local"
        - name: JAEGER_PORT
          value: "6831"
        
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        
        livenessProbe:
          httpGet:
            path: /health
            port: api
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        
        readinessProbe:
          httpGet:
            path: /ready
            port: api
          initialDelaySeconds: 10
          periodSeconds: 5
        
        volumeMounts:
        - name: config
          mountPath: /etc/swarm
        - name: persistent-state
          mountPath: /var/lib/swarm
      
      volumes:
      - name: config
        configMap:
          name: swarm-config
  
  volumeClaimTemplates:
  - metadata:
      name: persistent-state
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 100Gi

---
# Service for Coordinator (Internal)
apiVersion: v1
kind: Service
metadata:
  name: swarm-coordinator
  namespace: gpu-swarm
  labels:
    app: swarm-coordinator
spec:
  selector:
    app: swarm-coordinator
  ports:
  - name: api
    port: 9000
    targetPort: api
  - name: rpc
    port: 9091
    targetPort: rpc
  clusterIP: None  # Headless service for StatefulSet

---
# DaemonSet for GPU Node Agents
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: swarm-gpu-node
  namespace: gpu-swarm
spec:
  selector:
    matchLabels:
      app: swarm-gpu-node
  template:
    metadata:
      labels:
        app: swarm-gpu-node
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      nodeSelector:
        nvidia.com/gpu: "true"
      
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      
      containers:
      - name: gpu-node
        image: x3-chain/gpu-swarm-node:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        
        env:
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: COORDINATOR_URL
          value: "http://swarm-coordinator:9000"
        - name: JAEGER_HOST
          value: "jaeger.gpu-swarm.svc.cluster.local"
        
        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "8"
            memory: "16Gi"
            nvidia.com/gpu: "1"
        
        volumeMounts:
        - name: nvidia-install-dir
          mountPath: /usr/local/nvidia
        - name: var-lib-docker
          mountPath: /var/lib/docker
      
      volumes:
      - name: nvidia-install-dir
        hostPath:
          path: /usr/local/nvidia
      - name: var-lib-docker
        hostPath:
          path: /var/lib/docker

---
# Service for GPU Nodes (Metrics)
apiVersion: v1
kind: Service
metadata:
  name: swarm-gpu-nodes
  namespace: gpu-swarm
spec:
  selector:
    app: swarm-gpu-node
  type: ClusterIP
  ports:
  - name: metrics
    port: 9100
    targetPort: 9100

---
# Deployment for Monitoring Stack
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-stack
  namespace: gpu-swarm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-stack
  template:
    metadata:
      labels:
        app: monitoring-stack
    spec:
      containers:
      # Prometheus
      - name: prometheus
        image: prom/prometheus:v2.47.0
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-storage
          mountPath: /prometheus

      # Grafana
      - name: grafana
        image: grafana/grafana:10.0.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-credentials
              key: admin-password
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana

      # Jaeger (Distributed Tracing)
      - name: jaeger
        image: jaegertracing/all-in-one:1.47
        ports:
        - containerPort: 6831
          protocol: UDP
        - containerPort: 16686
        volumeMounts:
        - name: jaeger-storage
          mountPath: /badger/data

      volumes:
      - name: prometheus-config
        configMap:
          name: monitoring-config
      - name: prometheus-storage
        emptyDir: {}
      - name: grafana-storage
        emptyDir: {}
      - name: jaeger-storage
        emptyDir: {}

---
# Service for Monitoring Stack
apiVersion: v1
kind: Service
metadata:
  name: monitoring-stack
  namespace: gpu-swarm
spec:
  selector:
    app: monitoring-stack
  type: LoadBalancer
  ports:
  - name: prometheus
    port: 9090
    targetPort: 9090
  - name: grafana
    port: 3000
    targetPort: 3000
  - name: jaeger-ui
    port: 16686
    targetPort: 16686

---
# ServiceMonitor for Prometheus Operator (if installed)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gpu-swarm
  namespace: gpu-swarm
spec:
  selector:
    matchLabels:
      app: swarm-coordinator
  endpoints:
  - port: metrics
    interval: 30s

---
# NetworkPolicy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gpu-swarm-network-policy
  namespace: gpu-swarm
spec:
  podSelector:
    matchLabels:
      app: swarm-coordinator
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: swarm-gpu-node
    - podSelector:
        matchLabels:
          app: monitoring-stack
    ports:
    - protocol: TCP
      port: 9000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: swarm-gpu-node
    ports:
    - protocol: TCP
      port: 9000
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

---
# StorageClass for fast SSD storage
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
allowVolumeExpansion: true

---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: swarm-coordinator-pdb
  namespace: gpu-swarm
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: swarm-coordinator
