apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: x3-validator-0-data
  namespace: x3-chain
  labels:
    app: x3-chain
    validator: validator-0
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
  # Optional: specify storageClassName if using custom storage class
  # storageClassName: fast-ssd

