[package]
name = "proof-forge"
version = "1.0.0"
edition = "2021"
publish = false

[[bin]]
name = "x3-proof"
path = "src/main.rs"

[dependencies]
clap = { version = "4.4", features = ["derive"] }
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
anyhow = "1.0"
thiserror = "1.0"
regex = "1.10"
colored = "2.1"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
hex = "0.4"
tempfile = "3.8"
walkdir = "2.4"
indicatif = "0.17"
rayon = "1.8"
parking_lot = "0.12"

