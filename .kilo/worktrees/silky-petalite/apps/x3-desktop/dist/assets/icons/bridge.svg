<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#651fff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Left pillar -->
  <rect x="20" y="40" width="16" height="60" rx="3" fill="url(#bridgeGrad)" opacity="0.85"/>
  <!-- Right pillar -->
  <rect x="92" y="40" width="16" height="60" rx="3" fill="url(#bridgeGrad)" opacity="0.85"/>
  <!-- Bridge arch -->
  <path d="M28 50 Q64 10 100 50" fill="none" stroke="url(#bridgeGrad)" stroke-width="4"/>
  <!-- Cross-chain arrows -->
  <path d="M40 70 L88 70" stroke="url(#bridgeGrad)" stroke-width="2.5" stroke-dasharray="6 3"/>
  <polygon points="88,66 96,70 88,74" fill="url(#bridgeGrad)"/>
  <path d="M88 82 L40 82" stroke="url(#bridgeGrad)" stroke-width="2.5" stroke-dasharray="6 3" opacity="0.7"/>
  <polygon points="40,78 32,82 40,86" fill="url(#bridgeGrad)" opacity="0.7"/>
  <!-- Chain nodes -->
  <circle cx="28" cy="40" r="6" fill="url(#bridgeGrad)"/>
  <circle cx="100" cy="40" r="6" fill="url(#bridgeGrad)"/>
</svg>
