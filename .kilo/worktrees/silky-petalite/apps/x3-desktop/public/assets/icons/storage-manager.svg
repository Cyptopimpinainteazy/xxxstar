<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Storage Manager: stacked blocks with CID hash -->
  <rect x="10" y="36" width="44" height="14" rx="3" stroke="#8b5cf6" stroke-width="2" fill="#8b5cf6" fill-opacity="0.1"/>
  <rect x="10" y="20" width="44" height="14" rx="3" stroke="#8b5cf6" stroke-width="2" fill="#8b5cf6" fill-opacity="0.15"/>
  <rect x="10" y="4" width="44" height="14" rx="3" stroke="#8b5cf6" stroke-width="2" fill="#8b5cf6" fill-opacity="0.2"/>
  <!-- Pin indicators -->
  <circle cx="18" cy="11" r="2" fill="#4caf50"/>
  <circle cx="18" cy="27" r="2" fill="#4caf50"/>
  <circle cx="18" cy="43" r="2" fill="#ff9800"/>
  <!-- Hash text lines -->
  <line x1="24" y1="11" x2="48" y2="11" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
  <line x1="24" y1="27" x2="48" y2="27" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
  <line x1="24" y1="43" x2="42" y2="43" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3"/>
  <!-- Proof checkmark -->
  <polyline points="42,54 48,60 58,50" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
