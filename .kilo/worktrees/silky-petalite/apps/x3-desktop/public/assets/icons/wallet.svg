<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer card -->
  <rect x="16" y="32" width="96" height="64" rx="8" fill="url(#walletGrad)" opacity="0.2" stroke="url(#walletGrad)" stroke-width="2"/>
  <!-- Main wallet body -->
  <rect x="20" y="40" width="88" height="56" rx="6" fill="url(#walletGrad)" opacity="0.9"/>
  <!-- Coin slot -->
  <circle cx="64" cy="60" r="14" fill="none" stroke="#00d2ff" stroke-width="2"/>
  <!-- Coin inside -->
  <circle cx="64" cy="60" r="10" fill="#00d2ff" opacity="0.6"/>
  <!-- Shine -->
  <ellipse cx="58" cy="56" rx="6" ry="4" fill="#ffffff" opacity="0.4"/>
  <!-- Bottom accent band -->
  <rect x="20" y="88" width="88" height="8" rx="2" fill="#00d2ff" opacity="0.3"/>
</svg>