# Nodecore template for X3 Chain / X3
# Docs: https://github.com/drpcorg/nodecore

server:
  address: 0.0.0.0:9090

# Query paths exposed by nodecore
queries:
  ethereum:
    # Upstreams can be local dshackle proxy or external providers
    # Example local path through dshackle eth route
    upstreams:
      - id: dshackle-eth
        url: http://dshackle:8545/eth

# Optional auth/routing policy placeholders
policy:
  retries: 1
  timeout_ms: 4000
  hedge_requests: false
