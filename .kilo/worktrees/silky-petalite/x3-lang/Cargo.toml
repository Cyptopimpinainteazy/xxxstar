[workspace]
resolver = "2"
members = [
    "crates/x3-lexer",
    "crates/x3-ast",
    "crates/x3-common",
    "crates/x3-tools",
    "compiler",
    "vm",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["X3 Language Team"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/x3-chain/x3-lang"
description = "X3 - A systems language for agent swarms, atomic cross-chain execution, and MEV computation"

[workspace.dependencies]
# Core compiler dependencies
logos = "0.14"
chumsky = "0.9"
ariadne = "0.4"
internment = "0.8"
petgraph = "0.6"
indexmap = "2.1"
smallvec = "1.11"
bumpalo = "3.14"
rustc-hash = "1.1"
typed-arena = "2.0"

# LLVM integration
inkwell = { version = "0.4", features = ["llvm17-0"] }
llvm-sys = "170"

# Runtime dependencies
tokio = { version = "1.34", features = ["full"] }
async-trait = "0.1"
crossbeam = "0.8"
parking_lot = "0.12"
apps/dash-legacy-2-legacy-2map = "5.5"
flume = "0.11"
rayon = "1.8"

# Crypto dependencies
sha2 = "0.10"
sha3 = "0.10"
blake2 = "0.10"
blake3 = "1.5"
ed25519-dalek = "2.1"
secp256k1 = { version = "0.28", features = ["recovery", "rand"] }
k256 = "0.13"
rand = "0.8"
ring = "0.17"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
postcard = { version = "1.0", features = ["alloc"] }

# Networking
reqwest = { version = "0.11", features = ["json"] }
tonic = "0.10"
prost = "0.12"

# Chain adapters
ethers = "2.0"
solana-sdk = "1.17"
web3 = "0.19"

# Utilities
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4.4", features = ["derive"] }
colored = "2.0"
walkdir = "2.4"
notify = "6.1"
tempfile = "3.8"

# LSP
tower-lsp = "0.20"
ropey = "1.6"

# REPL
rustyline = "13.0"

# Testing
proptest = "1.4"
criterion = "0.5"

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3

[profile.dev]
opt-level = 1
debug = true
