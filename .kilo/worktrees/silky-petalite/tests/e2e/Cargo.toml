[package]
name = "e2e_tests"
version = "0.1.0"
edition = "2021"
description = "End-to-end integration tests for X3 Chain"
license = "MIT"
repository = "https://github.com/Cyptopimpinainteazy/x3-chain"

# No lib target - we only have integration tests
[lib]
path = "src/lib.rs"
test = false
doctest = false
bench = false

[[test]]
name = "cross_vm_real_chain_test"
path = "cross_vm_real_chain_test.rs"

[[test]]
name = "mainnet_rc1"
path = "mainnet_rc1.rs"
required-features = []

[features]
default = []
full_e2e = []

[dependencies]
tokio = { version = "1.0", features = ["full", "net", "time"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.11", features = ["json"] }
tokio-tungstenite = "0.20"
hex = "0.4"

# X3 SDK and core crates
x3-universal-contracts = { path = "../../crates/x3-universal-contracts" }
x3-ixl = { path = "../../crates/x3-ixl" }
x3-packet-standard = { path = "../../crates/x3-packet-standard" }
x3-liquidity-core = { path = "../../crates/x3-liquidity-core" }
x3-proof = { path = "../../crates/x3-proof" }
sp-core = { workspace = true }
x3-fees = { path = "../../crates/x3-fees" }
x3-slash = { path = "../../crates/x3-slash" }

# Testing utilities
tracing = "0.1"
tracing-subscriber = { workspace = true }
sha2 = "0.10"
once_cell = "1.19"

[dev-dependencies]
