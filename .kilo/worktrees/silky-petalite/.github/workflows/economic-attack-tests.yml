name: Economic Attack Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  economic-gate:
    name: Economic Attack Gate (S0)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build ProofForge
        run: cargo build -p proof-forge --release

      - name: Run Economic Gate
        run: |
          ./target/release/x3-proof economic-gate --strict --fail-hard 2>&1 | tee economic-gate-results.txt

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: economic-gate-results-${{ github.run_number }}
          path: economic-gate-results.txt
          retention-days: 30
