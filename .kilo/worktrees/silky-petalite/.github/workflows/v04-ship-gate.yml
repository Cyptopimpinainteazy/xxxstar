# V0.4 internal-mainnet path — strict CI gate
#
# This workflow is the *blocking* gate for the v0.4 internal-only mainnet RC.
# It does NOT replace the existing build/test workflows; it adds a focused,
# fast-failing gate over the crates that are on the critical shipping path:
#
#   - x3-packet-standard       (packet lifecycle — replay, timeout, commitment)
#   - x3-ixl                   (instruction layer — planner, interpreter, rollback)
#   - x3-readiness-report      (tri-state readiness — no false greens)
#   - pallet-x3-cross-vm-router (scope-freeze + full lib suite)
#
# Hard rules:
#   * Failures here MUST block merge.
#   * No `continue-on-error: true`. No `|| true`. No silent skips.
#   * fmt + clippy are deny-warnings on the v0.4 set.

name: v0.4 ship gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  v04-ship-gate:
    name: v0.4 critical-path crates
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (substrate transitive dep)
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: v04-ship-gate

      # Format check — only on v0.4 crates so a wide repo style sweep does
      # not block ship-critical PRs.
      - name: cargo fmt (v0.4 crates)
        run: |
          cargo fmt -p x3-packet-standard -p x3-ixl -p x3-readiness-report -- --check

      # Compile gate — every v0.4 crate, all targets, deny warnings.
      - name: cargo check (v0.4 crates, all targets)
        run: |
          cargo check \
            -p x3-packet-standard \
            -p x3-ixl \
            -p x3-readiness-report \
            -p pallet-x3-cross-vm-router \
            --all-targets

      # Clippy — same set, deny warnings.
      - name: cargo clippy (v0.4 crates, deny warnings)
        run: |
          cargo clippy \
            -p x3-packet-standard \
            -p x3-ixl \
            -p x3-readiness-report \
            -p pallet-x3-cross-vm-router \
            --all-targets -- -D warnings

      # Unit + property tests — these are the ones that prove invariants.
      - name: cargo test (v0.4 crates, lib)
        run: |
          cargo test \
            -p x3-packet-standard \
            -p x3-ixl \
            -p x3-readiness-report \
            --lib

      - name: cargo test (v0.4 crates, property tests)
        run: |
          cargo test -p x3-packet-standard --test properties
          cargo test -p x3-ixl --test properties

      # Router scope-freeze tests are launch blockers: they prove external
      # bridges cannot be opened without an explicit Root call. We run them
      # by name so a regression that drops the test surfaces clearly.
      - name: cargo test (router scope-freeze)
        run: |
          cargo test -p pallet-x3-cross-vm-router --lib -- \
            external_bridges_are_paused_at_genesis \
            register_external_root_rejected_when_bridges_disabled \
            emergency_pause_bridge_rejected_when_bridges_disabled \
            only_root_can_toggle_external_bridges \
            register_external_root_works_only_after_governance_enables

      # Router full lib suite is also required. This catches regressions in
      # packet/IXL integration and legacy execution paths that named smoke
      # tests do not cover.
      - name: cargo test (router full lib suite)
        run: |
          cargo test -p pallet-x3-cross-vm-router --lib

      # Readiness report must NEVER claim ready when offline. This is the
      # single most likely place for "demo theater" to creep back in.
      - name: cargo test (readiness honesty)
        run: |
          cargo test -p x3-readiness-report --lib -- \
            offline_collector_never_claims_readiness \
            live_collector_against_unreachable_endpoint_is_unknown_not_pass \
            unknown_blocks_ready

      # Mainnet RC-1 E2E suite — in-process tests that exercise the full
      # critical path without a live node.  All 15 scenarios must pass.
      # This step is a LAUNCH BLOCKER: failures here block merge to main.
      - name: cargo test (mainnet_rc1 E2E — launch blocker)
        run: |
          cargo test -p e2e_tests --test mainnet_rc1

      # Suppressions must be explicit and narrow, not broad ignores.
      - name: validate embarrassment suppressions
        run: |
          mkdir -p launch-gates/evidence/ci
          bash launch-gates/validate-embarrassment-suppressions.sh \
            launch-gates/embarrassment-suppressions.conf \
            | tee launch-gates/evidence/ci/embarrassment-suppressions-validation.log

      # Static hazard scan for production-facing critical paths only.
      # STRICT=1 blocks P0; STRICT_P2=1 + BLOCK_P2_CATEGORIES=DEV LOCALHOST blocks
      # development-only wording in shipping paths. Suppressions must be
      # explicit and documented in launch-gates/embarrassment-suppressions.conf.
      - name: embarrassment scan (v0.4 scoped strict)
        run: |
          mkdir -p launch-gates/evidence/ci
          STRICT=1 \
          STRICT_P2=1 \
          BLOCK_P2_CATEGORIES="DEV LOCALHOST" \
          SUPPRESSIONS_FILE="launch-gates/embarrassment-suppressions.conf" \
          SUPPRESSED_LOG="launch-gates/evidence/ci/embarrassment-suppressed-findings.txt" \
          SCAN_PATHS="crates/x3-packet-standard crates/x3-ixl crates/x3-readiness-report pallets/x3-cross-vm-router" \
          bash launch-gates/embarrassment-scan.sh \
            launch-gates/evidence/ci/proof-embarrassment-scan.log \
            launch-gates/evidence/ci/embarrassment-raw-findings.txt

      - name: summarize embarrassment evidence
        if: always()
        run: |
          bash launch-gates/summarize-embarrassment-evidence.sh \
            launch-gates/evidence/ci \
            launch-gates/evidence/ci/embarrassment-evidence-summary.md
          cat launch-gates/evidence/ci/embarrassment-evidence-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: upload embarrassment scan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v04-embarrassment-scan-evidence
          path: |
            launch-gates/evidence/ci/proof-embarrassment-scan.log
            launch-gates/evidence/ci/embarrassment-raw-findings.txt
            launch-gates/evidence/ci/embarrassment-suppressed-findings.txt
            launch-gates/evidence/ci/embarrassment-suppressions-validation.log
            launch-gates/evidence/ci/embarrassment-evidence-summary.md
          if-no-files-found: warn
