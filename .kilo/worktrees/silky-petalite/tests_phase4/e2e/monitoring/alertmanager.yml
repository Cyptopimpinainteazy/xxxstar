global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'x3-testnet@x3-chain.com'

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'
  routes:
  - match:
      severity: critical
    receiver: 'critical-alerts'
  - match:
      severity: warning
    receiver: 'warning-alerts'

receivers:
- name: 'web.hook'
  webhook_configs:
  - url: 'http://localhost:5001/'
    send_resolved: true

- name: 'critical-alerts'
  email_configs:
  - to: 'admin@x3-chain.com'
    subject: '[CRITICAL] X3 Testnet Alert'
    body: |
      Alert: {{ range .Alerts }}{{ .Annotations.summary }}
      Description: {{ .Annotations.description }}
      Severity: {{ .Labels.severity }}
      Instance: {{ .Labels.instance }}
      {{ end }}

- name: 'warning-alerts'
  email_configs:
  - to: 'team@x3-chain.com'
    subject: '[WARNING] X3 Testnet Alert'
    body: |
      Alert: {{ range .Alerts }}{{ .Annotations.summary }}
      Description: {{ .Annotations.description }}
      Severity: {{ .Labels.severity }}
      Instance: {{ .Labels.instance }}
      {{ end }}

inhibit_rules:
- source_match:
    severity: 'critical'
  target_match:
    severity: 'warning'
  equal: ['alertname', 'dev', 'instance']
