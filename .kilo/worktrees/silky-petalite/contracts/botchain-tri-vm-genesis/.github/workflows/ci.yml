name: Botchain CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # Python linting and tests
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio black flake8 mypy
      
      - name: Lint with flake8
        run: |
          flake8 python/ compiler/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 python/ compiler/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
      
      - name: Format check with black
        run: |
          black --check python/ compiler/
      
      - name: Type check with mypy
        run: |
          mypy python/ --ignore-missing-imports --no-error-summary || true
      
      - name: Run pytest
        run: |
          pytest tests/ -v --cov=python --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # Solidity compilation and tests
  hardhat-tests:
    name: Hardhat Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./hardhat
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: hardhat/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile contracts
        run: npx hardhat compile
      
      - name: Run tests
        run: npx hardhat test
      
      - name: Run coverage
        run: npx hardhat coverage || true
      
      - name: Check contract sizes
        run: npx hardhat size-contracts || true

  # Security analysis
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install security tools
        run: |
          pip install bandit safety
      
      - name: Run Bandit
        run: |
          bandit -r python/ compiler/ -ll --skip B101 || true
      
      - name: Check dependencies
        run: |
          safety check -r requirements.txt || true

  # Slither analysis for Solidity
  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./hardhat
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Set up Python for Slither
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Slither
        run: pip install slither-analyzer
      
      - name: Run Slither
        run: |
          slither . --exclude naming-convention,external-function || true

  # Docker build test
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Python image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/python/Dockerfile
          push: false
          tags: botchain/python:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Integration test (requires all services)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [python-tests, hardhat-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Install Hardhat dependencies
        working-directory: ./hardhat
        run: npm ci
      
      - name: Start Hardhat node
        working-directory: ./hardhat
        run: |
          npx hardhat node &
          sleep 5
      
      - name: Deploy contracts
        working-directory: ./hardhat
        run: |
          npx hardhat run scripts/deploy.js --network localhost
      
      - name: Run lifecycle simulator
        run: |
          python -m python.cli.simulate_lifecycle --network localhost --skip-chain || true

  # Release job (only on main)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [python-tests, hardhat-tests, security, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.1.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
