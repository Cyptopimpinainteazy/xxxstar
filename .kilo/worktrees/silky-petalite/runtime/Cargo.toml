native = []

gpu-validator = []

# Opt-in: enable real VM adapters for native-only developer workflows.
# Default behavior keeps native and WASM execution equivalent by using mocks.
native-real-vm-adapters = []

# Bridge support features
evm-bridge = []
solana-integration = []

# Real Frontier EVM execution path (post-RC1; OFF by default).
# Enabling this pulls pallet-evm/pallet-ethereum/precompiles/fp-evm into the
# build and activates the gated EVM Config + runtime APIs in src/lib.rs.
# Default RC-1 wasm runtime ships WITHOUT this feature — the cross-VM router
# uses the X3Evm scaffold path only.
frontier = [
	"pallet-evm",
	"pallet-ethereum",
	"pallet-evm-precompile-simple",
	"pallet-evm-precompile-modexp",
	"pallet-evm-precompile-sha3fips",
	"fp-evm",
	"fp-ethereum",
]

# Advanced analytics and indexer features
advanced-analytics = []

disable-runtime-api = []

try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"pallet-x3-invariants/try-runtime",
]
