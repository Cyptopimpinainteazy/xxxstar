<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X3STAR — Node Health Observatory</title>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono:wght@300;400;500;600;700&family=Red+Hat+Display:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070B12;
  --blue:#1E90FF;--blue2:#0055CC;--bluefaint:rgba(30,144,255,0.06);
  --green:#00D68F;--red:#FF3355;--gold:#FFB800;--purple:#9966FF;
  --text:#E8F4FF;--muted:rgba(100,160,220,0.3);--dim:#0C1220;
  --border:rgba(30,144,255,0.12);
  --rhm:'Red Hat Mono',monospace;--rhd:'Red Hat Display',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--rhd);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(30,144,255,0.05),transparent);}

/* NAV */
nav{position:sticky;top:0;z-index:100;height:54px;display:flex;align-items:center;
  padding:0 24px;background:rgba(7,11,18,0.98);border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);}
.logo{font-family:var(--rhm);font-size:14px;font-weight:600;letter-spacing:4px;color:var(--blue);margin-right:auto;}
.nb{padding:8px 18px;border-radius:7px;font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;border:none;font-family:var(--rhd);transition:all 0.2s;
  background:var(--blue);color:#fff;}
.nb:hover{box-shadow:0 0 24px rgba(30,144,255,0.4);}

/* HEADER ROW */
.header-row{padding:20px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:20px;position:relative;z-index:1;}
.hr-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.hr-title span{color:var(--blue);}
.hr-stats{display:flex;gap:16px;margin-left:auto;}
.hrs{text-align:center;}
.hrs-val{font-family:var(--rhm);font-size:16px;font-weight:700;}
.hrs-key{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.status-light{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
  border-radius:100px;font-size:10px;font-weight:700;letter-spacing:2px;font-family:var(--rhm);}
.sl-green{background:rgba(0,214,143,0.1);color:var(--green);border:1px solid rgba(0,214,143,0.25);}
.sl-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:slBlink 1.5s infinite;}
@keyframes slBlink{0%,100%{opacity:1}50%{opacity:0.3}}

/* HEALTH GRID */
.health-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:12px;padding:20px 24px 80px;position:relative;z-index:1;}

/* NODE CARD */
.node-card{background:rgba(10,16,26,0.9);border-radius:16px;padding:18px;
  border:1px solid rgba(255,255,255,0.05);transition:all 0.25s;cursor:pointer;}
.node-card:hover{border-color:var(--border);transform:translateY(-3px);
  box-shadow:0 8px 40px rgba(0,0,0,0.3);}
.node-card.ok{border-left:3px solid var(--green);}
.node-card.warn{border-left:3px solid var(--gold);}
.node-card.err{border-left:3px solid var(--red);}

/* CARD HEADER */
.nc-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.nc-flag{font-size:20px;flex-shrink:0;}
.nc-id{flex:1;}
.nc-name{font-family:var(--rhm);font-size:13px;font-weight:600;}
.nc-loc{font-size:10px;color:var(--muted);}
.nc-tier{font-size:8px;letter-spacing:1.5px;padding:3px 9px;border-radius:100px;font-weight:700;}
.nt-genesis{background:rgba(255,184,0,0.1);color:var(--gold);border:1px solid rgba(255,184,0,0.2);}
.nt-star{background:rgba(30,144,255,0.1);color:var(--blue);border:1px solid rgba(30,144,255,0.2);}
.nt-lite{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.08);}
.nc-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* METRICS ROW */
.nc-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.ncm{text-align:center;background:rgba(255,255,255,0.02);border-radius:8px;padding:8px 4px;}
.ncm-val{font-family:var(--rhm);font-size:14px;font-weight:700;line-height:1;}
.ncm-key{font-size:8px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:3px;}

/* MINI BARS */
.nc-bars{display:flex;flex-direction:column;gap:5px;}
.ncb-row{display:flex;align-items:center;gap:8px;}
.ncb-label{font-size:9px;color:var(--muted);width:72px;flex-shrink:0;}
.ncb-track{flex:1;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.ncb-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.ncb-val{font-family:var(--rhm);font-size:9px;color:var(--muted);width:36px;text-align:right;flex-shrink:0;}

/* SLASH BADGE */
.nc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.slash-badge{font-size:8px;letter-spacing:1px;font-weight:700;padding:2px 8px;border-radius:4px;}
.sb-clean{background:rgba(0,214,143,0.1);color:var(--green);border:1px solid rgba(0,214,143,0.2);}
.sb-warn{background:rgba(255,184,0,0.1);color:var(--gold);border:1px solid rgba(255,184,0,0.2);}
.nc-time{font-family:var(--rhm);font-size:9px;color:var(--muted);}

/* HEARTBEAT PULSE */
.pulse-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pd-ok{background:var(--green);box-shadow:0 0 6px var(--green);animation:pdBlink 2s infinite;}
.pd-warn{background:var(--gold);box-shadow:0 0 6px var(--gold);animation:pdBlink 1.2s infinite;}
.pd-err{background:var(--red);box-shadow:0 0 6px var(--red);animation:pdBlink 0.6s infinite;}
@keyframes pdBlink{0%,100%{transform:scale(1)}50%{transform:scale(1.3);}}

/* BOTTOM FIXED BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;height:52px;
  display:flex;align-items:center;padding:0 24px;gap:16px;
  background:rgba(7,11,18,0.98);border-top:1px solid var(--border);}
.bb-text{font-size:12px;color:var(--muted);}
.bb-cta{padding:9px 22px;border-radius:7px;background:var(--blue);color:#fff;border:none;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:var(--rhd);}
</style>
</head>
<body>

<nav>
  <div class="logo">X3STAR</div>
  <a href="x3star-operator-war-room.html" style="font-size:10px;letter-spacing:2px;color:var(--muted);text-decoration:none;margin-right:16px;">War Room</a>
  <a href="x3star-hall-of-fame.html" style="font-size:10px;letter-spacing:2px;color:var(--muted);text-decoration:none;margin-right:20px;">Hall of Fame</a>
  <button class="nb" onclick="location.href='x3star-validator-presale.html'">Run a Node →</button>
</nav>

<div class="header-row">
  <div>
    <h1 class="hr-title">Node Health <span>Observatory</span></h1>
    <div style="font-size:12px;color:var(--muted);margin-top:3px;">Live per-node health scores across the X3STAR network</div>
  </div>
  <div class="status-light sl-green"><div class="sl-dot"></div>NETWORK HEALTHY</div>
  <div class="hr-stats">
    <div class="hrs"><div class="hrs-val" style="color:var(--green)">--</div><div class="hrs-key">Online</div></div>
    <div class="hrs"><div class="hrs-val" style="color:var(--red)">--</div><div class="hrs-key">Slashed</div></div>
    <div class="hrs"><div class="hrs-val" style="color:var(--gold)">--</div><div class="hrs-key">Warnings</div></div>
    <div class="hrs"><div class="hrs-val">--</div><div class="hrs-key">Avg Uptime</div></div>
    <div class="hrs"><div class="hrs-val" style="color:var(--blue)">--</div><div class="hrs-key">Net TPS</div></div>
  </div>
</div>

<div class="health-grid" id="health-grid"></div>

<div class="bottom-bar">
  <div class="bb-text">Live validator telemetry and presale availability are loaded from the X3 site data layer.</div>
  <button class="bb-cta" onclick="location.href='x3star-validator-presale.html'" style="margin-left:auto;">Reserve Your Node →</button>
</div>

<script src="js/x3-data-api.js"></script>
<script src="js/x3-page-adapters.js"></script>
<script>
X3PageAdapters.start();
</script>
</body>
</html>
