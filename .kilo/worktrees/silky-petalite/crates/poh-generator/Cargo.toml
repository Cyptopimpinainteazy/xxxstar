[package]
name = "x3-poh-generator"
version = "0.1.0"
edition = "2021"
description = "Proof of History digest generator — verifiable time ordering for X3 blocks"
license = "Apache-2.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
hex = "0.4"
tracing = "0.1"
anyhow = "1"
parity-scale-codec = { version = "3.6", default-features = false, features = ["derive"] }
sp-core = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }
sp-inherents = { workspace = true, default-features = false }
async-trait = "0.1"

[features]
default = ["std"]
std = [
    "parity-scale-codec/std",
    "sp-core/std",
    "sp-runtime/std",
    "sp-inherents/std",
]
