[package]
name = "x3-semantics"
version = "0.1.0"
edition = "2021"
description = "Semantic analysis for the X3 language - name resolution, scopes, and symbol tables"
license = "MIT"

[dependencies]
x3-ast = { path = "../x3-ast" }
x3-common = { path = "../x3-common" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
x3-parser = { path = "../x3-parser" }
