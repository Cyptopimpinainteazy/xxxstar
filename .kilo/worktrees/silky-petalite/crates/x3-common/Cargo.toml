[package]
name = "x3-common"
version = "0.1.0"
edition = "2021"
license.workspace = true
publish = false

[dependencies]
serde = { version = "1.0", features = ["derive"], default-features = false }
sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
hex = { version = "0.4", default-features = false, features = ["alloc"] }
ed25519-dalek = { version = "2.1", default-features = false, features = ["alloc"] }
secp256k1 = { version = "0.28", default-features = false, features = ["alloc", "recovery", "rand"] }

[features]
default = ["std"]
std = ["serde/std", "sp-core/std", "sp-io/std", "sp-runtime/std", "sp-std/std", "hex/std", "ed25519-dalek/std", "secp256k1/std"]
alloc = ["serde/alloc"]
