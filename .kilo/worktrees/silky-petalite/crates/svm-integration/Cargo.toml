[package]
name = "x3-svm-integration"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "SVM (Solana) integration for X3 Chain dual-VM execution"
publish = false

[dependencies]
# Substrate primitives
sp-core = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }
sp-io = { workspace = true, default-features = false }

# Serialization
parity-scale-codec = { workspace = true, default-features = false }
scale-info = { workspace = true, default-features = false }
ed25519-dalek = { version = "2.1", default-features = false, features = ["alloc"] }

# Logging
log = { workspace = true, default-features = false }

# Solana BPF runtime (std only for now)
solana_rbpf = { workspace = true, optional = true }

[dev-dependencies]
sp-io = { workspace = true }
solana-program = "3.0.0"
solana-program-test = { version = "3.0.0", features = ["agave-unstable-api"] }
# Add explicit dev-deps required by integration tests after Solana v3 upgrade
solana-sdk = "3.0.0"
tokio = { version = "1", features = ["macros", "rt"] }
svm_counter = { path = "../svm-counter" }

[features]
default = ["std"]
std = [
    "sp-core/std",
    "sp-runtime/std",
    "sp-std/std",
    "sp-io/std",
    "parity-scale-codec/std",
    "scale-info/std",
    "log/std",
    "solana_rbpf",
]
test-utils = []
