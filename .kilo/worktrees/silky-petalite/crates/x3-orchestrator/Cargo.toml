[package]
name = "x3-orchestrator"
version = "0.1.0"
edition = "2021"
description = "X3 Atomic Star Interchain Orchestrator: cross-VM message routing, proof verification, replay protection, and canonical supply invariants for EVM/SVM/X3VM execution domains."
license = "Apache-2.0"

[dependencies]
thiserror = { workspace = true }
serde = { version = "1.0.195", features = ["derive", "std"], default-features = false }
serde_json = "1.0"
sha2 = "0.10"
hex = { version = "0.4.3", default-features = false, features = ["std"] }
parking_lot = "0.12"

[dev-dependencies]
