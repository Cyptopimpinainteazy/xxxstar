[package]
name = "x3-ixl"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "X3 Internal eXchange Language: instruction set, planner, interpreter, receipts, rollback."

[dependencies]
parity-scale-codec = { workspace = true, features = ["max-encoded-len"] }
scale-info = { workspace = true }
sp-core = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
x3-packet-standard = { path = "../x3-packet-standard", default-features = false }

[features]
default = ["std"]
std = [
    "parity-scale-codec/std",
    "scale-info/std",
    "sp-core/std",
    "sp-runtime/std",
    "sp-std/std",
    "x3-packet-standard/std",
]

[dev-dependencies]
proptest = "1.4"
