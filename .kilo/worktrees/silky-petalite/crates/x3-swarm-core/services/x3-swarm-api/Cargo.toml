[package]
name = "x3-swarm-api"
version = "0.1.0"
edition = "2021"
repository = "https://github.com/Cyptopimpinainteazy/X3_ATOMIC_STAR"
license = "Apache-2.0"
authors = ["X3 Team"]
description = "X3 swarm API service for agent orchestration"

[dependencies]
axum = { version = "~0.7.9", features = ["macros"] }
axum-server = "~0.8.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
serde = { version = "~1.0.228", features = ["derive"] }
serde_json = "~1.0.145"
chrono = { version = "~0.4.42", features = ["serde"] }
