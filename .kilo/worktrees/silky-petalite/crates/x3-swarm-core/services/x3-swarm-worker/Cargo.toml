[package]
name = "x3-swarm-worker"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["X3 Team"]

[dependencies]
anyhow = "1.0"
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["rt-multi-thread", "macros", "time", "process"] }
