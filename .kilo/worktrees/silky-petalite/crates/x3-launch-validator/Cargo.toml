[package]
name = "x3-launch-validator"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "X3 Adversarial World Launch Checklist Validator (vΩ-1.0)"

[[bin]]
name = "x3-launch-check"
path = "src/main.rs"

[dependencies]
x3-constitution = { path = "../x3-constitution" }
x3-proof = { path = "../x3-proof" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
hex = "0.4"
thiserror = "1.0"
