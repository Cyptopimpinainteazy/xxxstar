[package]
name = "x3-court"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "X3 Deterministic Courts — replay-based dispute resolution with no humans"

[dependencies]
x3-proof = { path = "../x3-proof" }
x3-slash = { path = "../x3-slash" }
x3-intent = { path = "../x3-intent" }
x3-agent = { path = "../x3-agent" }
serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
thiserror = "1.0"

[dev-dependencies]
serde_json = "1.0"
