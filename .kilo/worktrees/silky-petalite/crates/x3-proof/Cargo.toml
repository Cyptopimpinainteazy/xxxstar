[package]
name = "x3-proof"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "X3 Proof Engine — deterministic execution proofs and verification"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
hex = "0.4"
thiserror = "1.0"
clap = { version = "4.5", features = ["derive"] }

[dev-dependencies]
serde_json = "1.0"

[features]
default = ["std"]
std = [
    "serde/std",
]
