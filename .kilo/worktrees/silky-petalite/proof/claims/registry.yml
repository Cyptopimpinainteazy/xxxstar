# Evidence types
evidence_types:
  - name: unit_test
    weight: 1.0
    required: true
  - name: integration_test
    weight: 1.5
    required: true
  - name: invariant_test
    weight: 2.0
    required: true
  - name: fuzz_test
    weight: 1.5
    required: false
  - name: formal_proof
    weight: 3.0
    required: false
  - name: mutation_test
    weight: 2.0
    required: false
  - name: benchmark
    weight: 1.0
    required: false
  - name: security_audit
    weight: 2.5
    required: false
  - name: chaos_test
    weight: 2.0
    required: false

# Proof status definitions
statuses:
  VERIFIED: "Claim has fresh receipts and passing tests"
  PARTIAL: "Some evidence exists but gaps remain"
  FAILED: "Evidence shows claim is false"
  UNVERIFIED: "No evidence or receipts exist"
  STALE: "Evidence exists but is outdated by code changes"
  BLOCKED: "Cannot verify due to missing dependencies"
  REVOKED: "Previously verified but now invalid"
