# Patches for Substrate dependencies - using consistent git rev
[patch.crates-io]
# Pin home to a rustc 1.85 compatible release (local patch).
home = { path = "patches/home" }
# Enable bulk-memory opcode parsing (0xFC prefix) so Substrate can deserialize rustc-generated WASM.
parity-wasm = { path = "patches/parity-wasm" }
# Make wasm-instrument compatible with bulk instructions when parity-wasm/bulk is enabled.
wasm-instrument = { path = "patches/wasm-instrument" }
# Override wasmtime to v42.0.2 to fix CRITICAL security vulnerabilities (RUSTSEC-2026-*)
# polkadot-stable2512 released March 31, 2026 before April 9, 2026 CVE disclosures
# Note: wasmtime override removed due to patch conflicts - manual update needed
# Fix environmental macro compatibility
environmental = { path = "patches/environmental" }
# Fix substrate-prometheus-endpoint protobuf type mismatch (Vec -> RepeatedField)
substrate-prometheus-endpoint = { path = "patches/substrate-prometheus-endpoint" }
# Fix errno WASM compatibility by providing stub implementation for wasm32 targets
errno = { path = "patches/errno" }
# Pin ar_archive_writer to a rustc 1.85 compatible implementation.
# NOTE: currently unused in the active dependency graph.
# ar_archive_writer = { path = "patches/ar_archive_writer" }
# Fix getrandom for wasm32-unknown-unknown (Substrate WASM runtime)
getrandom = { path = "patches/getrandom" }
# core2 0.4.0 was yanked from crates.io; pin to local copy.
core2 = { path = "patches/core2" }
# Patch native crates that pulled getrandom 0.3/0.4 back down to 0.2.17
fastbloom = { path = "patches/fastbloom" }
jobserver = { path = "patches/jobserver" }
quinn-proto = { path = "patches/quinn-proto" }
rand_core = { path = "patches/rand_core" }
tempfile = { path = "patches/tempfile" }
uuid = { path = "patches/uuid" }
memfd = { path = "patches/memfd" }
# Fix ahash to use getrandom 0.2 instead of 0.3 (0.3 doesn't support wasm32-unknown-unknown)
ahash = { path = "patches/ahash" }
# Stub icu_properties to avoid rustc ICE on string literal unescaping.
# Disabled until the lockfile resolves a crate graph that actually uses it,
# otherwise cargo warns on every workspace invocation that the patch is unused.
# icu_properties = { path = "patches/icu_properties_stub" }
# Patch idna_adapter to work with our icu_properties_stub GeneralCategory newtype
idna_adapter = { path = "patches/idna_adapter" }
# Force sp-io to use patched Substrate git version (don't use crates.io 23.0.0 which lacks wasm support)
# NOTE: [patch] entries do not support default-features/features — those fields are silently ignored.
sp-application-crypto = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-io = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-inherents = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }

# Experimental: attempt to unify `curve25519-dalek` across workspace to satisfy Solana and Substrate consumers
# REVERTED: workspace unification proved incompatible with pinned Substrate deps — keeping isolated SVM integration test instead
# (was: curve25519-dalek = { git = "https://github.com/dalek-cryptography/curve25519-dalek", tag = "3.2.1" })
# Also patch getrandom 0.1.16 to version alias - leave upstream (substrate uses it differently)
sc-client-api = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
# sc-service = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
# NOTE: currently unused in the active dependency graph (sc-service is resolved from polkadot-stable2512).
# Redirect crates.io sp-* references (pulled by Frontier/WASM build) to the git
# version so that workspace feature `disable_target_static_assertions` propagates
# and prevents host-target assert_eq_size!(usize, u32) failures on x86_64.
sp-runtime-interface = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-runtime-interface-proc-macro = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-externalities = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-std = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-storage = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-tracing = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-wasm-interface = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
sp-debug-derive = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }

# Patch polkadot-sdk with local modifications for prometheus fix and executor bulk-memory support
[patch."https://github.com/paritytech/polkadot-sdk"]
substrate-prometheus-endpoint = { path = "patches/substrate-prometheus-endpoint" }
# X3 patch: emit unconditional Serialize/Deserialize derives on pallet GenesisConfig structs so
# that the BuildGenesisConfig trait bound `MaybeSerializeDeserialize` is satisfied in no_std
# wasm32 builds when sp-runtime/serde is enabled. Required for clean wasm runtime build under
# polkadot-sdk stable2512.
frame-support-procedural = { path = "patches/frame-support-procedural" }
# sc-network patches removed due to SDK version mismatches (stable2603 vs stable2512)
# Using SDK versions directly instead
# sc-network = { path = "patches/sc-network" }
# sc-network-common = { path = "patches/sc-network/common" }
# sc-network-light = { path = "patches/sc-network/light" }
# sc-network-sync = { path = "patches/sc-network/sync" }
# sc-network-transactions = { path = "patches/sc-network/transactions" }

[patch."https://github.com/polkadot-evm/frontier"]
# trie-db is not in the frontier git repo so no patch needed here
cumulus-primitives-storage-weight-reclaim = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }
cumulus-primitives-proof-size-hostfunction = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512" }

# Patch Frontier (polkadot-evm) sp-io to match workspace version and avoid duplicate panic_impl
