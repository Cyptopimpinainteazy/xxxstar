SPECIFICATION Spec

CONSTANTS
    Steps        = {build, verify_flashloans, verify_evm_svm}
    \* Mirrors the actual ttfv_benchmark.json step order.
    StepOrder    = (build              :> 1
                 @@ verify_flashloans  :> 2
                 @@ verify_evm_svm     :> 3)
    \* Durations in seconds (rounded up from the recorded benchmark:
    \* 22.924s + 1.214s + 0.092s = 24.230s; using 23/2/1 = 26 keeps TLC
    \* in integer arithmetic and stays well under Budget=600).
    StepDuration = (build              :> 23
                 @@ verify_flashloans  :> 2
                 @@ verify_evm_svm     :> 1)
    StepOutcome  = (build              :> "ok"
                 @@ verify_flashloans  :> "ok"
                 @@ verify_evm_svm     :> "ok")
    Budget       = 600

INVARIANTS
    Invariant
    NoStepFailed
    WithinBudget

CHECK_DEADLOCK FALSE
