# Logstash pipeline configuration for GPU Swarm logs
# Processes logs from multiple sources and enriches with contextual data

input {
  # TCP input from Swarm nodes (syslog-ng compatible)
  tcp {
    port => 5000
    type => "swarm_logs"
    codec => json
  }

  # UDP input for high-throughput logging
  udp {
    port => 5000
    type => "swarm_logs_udp"
    codec => json
  }

  # File input for batch log processing
  file {
    path => "/var/log/gpu-swarm/*.log"
    start_position => "beginning"
    type => "swarm_file_logs"
    codec => json
  }

  # Docker logs via GELF
  gelf {
    port => 12201
    type => "docker_logs"
  }

  # Kubernetes logs via Filebeat
  beats {
    port => 5044
    type => "kubernetes_logs"
  }

  # X3 execution logs (specialized format)
  file {
    path => "/var/log/x3-execution/*.log"
    start_position => "beginning"
    type => "x3_execution_logs"
    codec => multiline {
      pattern => "^\\["
      negate => true
      what => "previous"
    }
  }
}

filter {
  # JSON parsing for structured logs
  if [type] == "swarm_logs" or [type] == "swarm_logs_udp" {
    json {
      source => "message"
      target => "parsed_log"
    }

    # Extract key fields
    mutate {
      add_field => {
        "[@metadata][index_name]" => "swarm-logs-%{+YYYY.MM.dd}"
        "[@metadata][action]" => "index"
      }
      rename => {
        "[parsed_log][timestamp]" => "@timestamp"
        "[parsed_log][level]" => "log_level"
        "[parsed_log][component]" => "component"
        "[parsed_log][node_id]" => "node_id"
        "[parsed_log][task_id]" => "task_id"
        "[parsed_log][message]" => "[message]"
      }
    }

    # Parse log level
    if [log_level] == "ERROR" or [log_level] == "FATAL" {
      mutate { add_tag => [ "error" ] }
    } else if [log_level] == "WARN" {
      mutate { add_tag => [ "warning" ] }
    }
  }

  # Docker logs enrichment
  if [type] == "docker_logs" {
    mutate {
      add_field => {
        "container_id" => "%{docker_container_id}"
        "container_name" => "%{docker_container_name}"
        "image_name" => "%{docker_image_name}"
        "[@metadata][index_name]" => "docker-logs-%{+YYYY.MM.dd}"
      }
      remove_field => [ "docker_container_id", "docker_container_name", "docker_image_name" ]
    }
  }

  # Kubernetes logs enrichment
  if [type] == "kubernetes_logs" {
    mutate {
      add_field => {
        "pod_name" => "%{kubernetes_pod_name}"
        "namespace" => "%{kubernetes_namespace}"
        "container_name" => "%{kubernetes_container_name}"
        "[@metadata][index_name]" => "kubernetes-logs-%{+YYYY.MM.dd}"
      }
    }
  }

  # X3 execution logs parsing
  if [type] == "x3_execution_logs" {
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{LOGLEVEL:loglevel} \[%{DATA:module}\] %{GREEDYDATA:msg}"
      }
    }

    grok {
      match => {
        "msg" => "Task %{UUID:task_id} completed in %{NUMBER:execution_time}ms with gas=%{NUMBER:gas_used}"
      }
      optional => true
    }

    mutate {
      add_field => {
        "[@metadata][index_name]" => "x3-execution-%{+YYYY.MM.dd}"
      }
      convert => {
        "execution_time" => "float"
        "gas_used" => "float"
      }
    }

    # Add tags for analytics
    if [gas_used] > 1000000 {
      mutate { add_tag => [ "high_gas_usage" ] }
    }
  }

  # Geolocate based on node_id (if available in GeoIP database)
  if [node_id] {
    translate {
      field => "node_id"
      destination => "node_location"
      dictionary_path => "/usr/share/logstash/node-locations.json"
      fallback => "Unknown"
    }
  }

  # Add timestamp if missing
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Remove null/empty fields
  mutate {
    remove_field => ["message"]
  }

  # Parse error messages for alerting
  if "error" in [tags] {
    grok {
      match => {
        "[message]" => "%{GREEDYDATA:error_message}"
      }
    }

    # Create alert flag for critical errors
    if [log_level] == "FATAL" or [log_level] == "CRITICAL" {
      mutate {
        add_field => { "requires_alert" => true }
      }
    }
  }

  # Parse GPU metrics from logs
  grok {
    match => {
      "message" => "GPU utilization: %{NUMBER:gpu_utilization}% memory: %{NUMBER:gpu_memory_used}/%{NUMBER:gpu_memory_total} temp: %{NUMBER:gpu_temp}C"
    }
    optional => true
  }

  # Parse network metrics
  grok {
    match => {
      "message" => "peers: %{NUMBER:peer_count} latency: %{NUMBER:network_latency}ms bandwidth: %{NUMBER:bandwidth}Mbps"
    }
    optional => true
  }

  # Convert numeric fields
  if [gpu_utilization] {
    mutate {
      convert => {
        "gpu_utilization" => "float"
        "gpu_memory_used" => "float"
        "gpu_memory_total" => "float"
        "gpu_temp" => "float"
        "peer_count" => "integer"
        "network_latency" => "float"
        "bandwidth" => "float"
      }
    }
  }

  # Add environment/deployment info
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:production}"
      "region" => "${AWS_REGION:us-east-1}"
      "cluster" => "${CLUSTER_NAME:gpu-swarm-prod}"
    }
  }

  # Parse response codes for API logs
  if [type] == "api_logs" {
    grok {
      match => {
        "message" => "%{IP:client_ip} - %{DATA:user} \[%{HTTPDATE:request_time}\] \"%{WORD:method} %{DATA:path} HTTP/%{NUMBER:http_version}\" %{NUMBER:status_code} %{NUMBER:bytes}"
      }
    }

    mutate {
      convert => { "status_code" => "integer" }
      convert => { "bytes" => "integer" }
    }

    # Tag error responses
    if [status_code] >= 400 {
      mutate { add_tag => [ "http_error" ] }
    }
  }

  # Fingerprinting for deduplication
  fingerprint {
    source => ["component", "log_level", "message"]
    target => "message_fingerprint"
    method => "MURMUR3"
  }
}

output {
  # Main output to Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"
    index => "%{[@metadata][index_name]}"
    action => "%{[@metadata][action]}"
    document_id => "%{message_fingerprint}"
    retry_on_conflict => 3
  }

  # Send alerts to Kafka for processing
  if [requires_alert] == true {
    kafka {
      bootstrap_servers => "${KAFKA_BOOTSTRAP:kafka:9092}"
      topic_id => "swarm-alerts"
      codec => json
    }
  }

  # Also send to S3 for long-term archive
  s3 {
    region => "${AWS_REGION:us-east-1}"
    bucket => "${LOG_ARCHIVE_BUCKET:gpu-swarm-logs-archive}"
    prefix => "logs/%{+YYYY}/%{+MM}/%{+dd}/"
    temporary_directory => "/tmp/logstash-s3"
    upload_queue_size => 2
    upload_workers => 4
  }

  # Send critical errors to Slack
  if "error" in [tags] and [log_level] == "CRITICAL" {
    slack {
      url => "${SLACK_WEBHOOK:https://hooks.slack.com/services/YOUR/WEBHOOK/URL}"
      message => "🚨 CRITICAL: %{log_level} from %{component} on %{node_id}"
      format => "%{message}"
    }
  }

  # Also output to stdout for debugging (in non-production)
  if [@metadata][environment] == "development" {
    stdout {
      codec => rubydebug
    }
  }
}
