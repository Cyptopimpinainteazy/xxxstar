version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jury-postgres-prod
    environment:
      POSTGRES_DB: jury_db
      POSTGRES_USER: ${DB_USER:-jury_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./schemas/jury.sql:/docker-entrypoint-initdb.d/01-jury.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jury_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - jury-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jury-redis-prod
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - jury-network

  # Substrate Blockchain Node
  blockchain-node:
    build:
      context: .
      dockerfile: Dockerfile.blockchain
      args:
        HARDWARE: ${HARDWARE:-cpu}
    container_name: jury-blockchain-prod
    environment:
      RUST_LOG: info
      WASM_RUNTIME_OVERRIDES: /runtime/x3-jury-anchor.wasm
      JURY_AUTHORITY: ${JURY_AUTHORITY}
    volumes:
      - blockchain_data_prod:/data
      - ./pallets/x3-jury-anchor:/runtime/pallet
    ports:
      - "9944:9944"  # RPC
      - "9933:9933"  # WebSocket
      - "30333:30333" # P2P
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944", "-X", "POST",
             "-H", "Content-Type: application/json",
             "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"system_health\",\"params\":[],\"id\":1}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - jury-network

  # Jury Service (REST API)
  jury-service:
    image: x3-jury:latest
    container_name: jury-service-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      blockchain-node:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-jury_admin}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: jury_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - jury-network

  # Jury Anchoring Service
  jury-anchorer:
    image: x3-jury-anchorer:latest
    container_name: jury-anchorer-prod
    depends_on:
      jury-service:
        condition: service_healthy
      blockchain-node:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      RPC_URL: http://blockchain-node:9944
      JURY_SERVICE_URL: http://jury-service:8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-jury_admin}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JURY_AUTHORITY: ${JURY_AUTHORITY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POLLING_INTERVAL_SECONDS: 2
      MAX_FINALIZATION_ATTEMPTS: 30
    volumes:
      - ./logs/anchorer:/app/logs
      - ./swarm/jury:/app/jury
    restart: always
    networks:
      - jury-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: jury-prometheus-prod
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_prod:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: always
    networks:
      - jury-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: jury-grafana-prod
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ''
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data_prod:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: always
    networks:
      - jury-network

volumes:
  postgres_data_prod:
    driver: local
  blockchain_data_prod:
    driver: local
  prometheus_data_prod:
    driver: local
  grafana_data_prod:
    driver: local

networks:
  jury-network:
    driver: bridge
