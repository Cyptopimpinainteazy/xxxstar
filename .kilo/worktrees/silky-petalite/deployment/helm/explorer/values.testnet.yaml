# Testnet-specific values for Explorer
replicaCount: 2

image:
  tag: "latest"

resources:
  requests:
    cpu: "300m"
    memory: "384Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 65

ingress:
  host: explorer.testnet.x3-chain.io
