replicaCount: 2

image:
  repository: "x3-chain/explorer"
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  host: explorer.testnet.x3-chain.io
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

# Health & lifecycle
healthPath: "/"
lifecycle:
  preStopSleepSeconds: 10

# Horizontal Pod Autoscaler (optional)
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Canary settings (NGINX ingress canary annotations)
canary:
  enabled: false
  image:
    tag: ""          # optional override for canary image tag
  replicas: 1
  weight: 10         # percentage of traffic routed to canary when enabled
  resources: {}

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

env:
  NEXT_PUBLIC_NETWORK: "testnet"
  NEXT_PUBLIC_SUBSTRATE_WS_ENDPOINT: "wss://rpc.testnet.x3-chain.io:9944"

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
