input {
  tcp {
    port => 5000
    codec => json
  }
  udp {
    port => 5000
    codec => json
  }
  file {
    path => "/var/log/gpu-swarm/*.log"
    codec => json
    start_position => "beginning"
  }
}

filter {
  # Parse JSON logs
  if [message] {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Extract fields
  mutate {
    add_field => {
      "[@metadata][index_name]" => "logstash-%{+YYYY.MM.dd}"
    }
    rename => {
      "parsed[level]" => "level"
      "parsed[service]" => "service"
      "parsed[message]" => "message"
      "parsed[timestamp]" => "@timestamp"
      "parsed[trace_id]" => "trace_id"
      "parsed[span_id]" => "span_id"
    }
  }

  # Parse log level
  ruby {
    code => '
      level_map = {
        "CRITICAL" => 5,
        "ERROR" => 4,
        "WARNING" => 3,
        "INFO" => 2,
        "DEBUG" => 1
      }
      event.set("severity_level", level_map[event.get("level")] || 0)
    '
  }

  # Add hostname and environment
  mutate {
    add_field => {
      "hostname" => "${HOSTNAME}"
      "environment" => "production"
      "cluster" => "x3-chain"
    }
  }

  # GeoIP enrichment (optional)
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Date parsing
  date {
    match => ["@timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
    codec => json
  }

  # Also log to stdout for debugging
  stdout {
    codec => rubydebug
  }

  # Send to CloudWatch (if needed)
  # cloudwatch {
  #   log_group_name => "/gpu-swarm/logs"
  #   log_stream_name => "%{service}-%{hostname}"
  # }
}
