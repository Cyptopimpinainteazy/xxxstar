[package]
name = "pallet-x3-invariants"
version = "0.1.0"
authors = ["X3 Chain Core Team <core@x3-chain.io>"]
description = "On-chain invariant enforcement pallet. Checks constitutional invariants every block and halts on violation."
edition = "2021"
license = "Apache-2.0"
homepage = "https://x3-chain.io"
repository = "https://github.com/x3-chain/x3-chain"
publish = false

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lib]
crate-type = ["rlib"]

[dependencies]
frame-support = { workspace = true, default-features = false }
frame-system = { workspace = true, default-features = false }
frame-benchmarking = { workspace = true, default-features = false, optional = true }
parity-scale-codec = { workspace = true, default-features = false, features = ["derive", "max-encoded-len"] }
scale-info = { workspace = true, default-features = false, features = ["derive"] }
sp-core = { workspace = true, default-features = false }
sp-io = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }
log = { version = "0.4", default-features = false }
serde = { workspace = true, optional = true, features = ["derive"] }
x3-security-events = { path = "../../crates/x3-security-events", default-features = false }

[dev-dependencies]
sp-io = { workspace = true }
frame-support = { workspace = true, features = ["std"] }
frame-system = { workspace = true, features = ["std"] }
pallet-balances = { workspace = true, features = ["std"] }

[features]
default = ["std"]
std = [
    "frame-support/std",
    "frame-system/std",
    "parity-scale-codec/std",
    "scale-info/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "sp-std/std",
    "serde/std",
    "log/std",
    "frame-benchmarking?/std",
    "x3-security-events/std",
]
runtime-benchmarks = [
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "frame-benchmarking/runtime-benchmarks",
]
try-runtime = [
    "frame-support/try-runtime",
    "frame-system/try-runtime",
]
