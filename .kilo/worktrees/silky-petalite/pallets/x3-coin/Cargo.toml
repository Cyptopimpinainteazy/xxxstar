[package]
name = "pallet-x3-coin"
version = "0.1.0"
edition = "2021"
authors = ["X3 Team <team@x3chain.org>"]
license = "MIT"

[dependencies]
codec = { package = "parity-scale-codec", version = "3.7", default-features = false, features = [
  "derive",
] }
scale-info = { version = "2.11", default-features = false, features = ["derive"] }
serde = { version = "1.0", optional = true }

frame-support = { workspace = true }
frame-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }
sp-runtime = { workspace = true }
sp-api = { workspace = true }
sp-std = { workspace = true }
sp-io = { workspace = true }
sp-core = { workspace = true }

# X3-specific dependencies
pallet-x3-kernel = { path = "../x3-kernel", default-features = false }

[dev-dependencies]
pallet-balances = { workspace = true }
pallet-timestamp = { workspace = true }

[features]
default = ["std"]
std = [
  "codec/std",
  "scale-info/std",
  "serde",
  "frame-support/std",
  "frame-system/std",
  "frame-benchmarking/std",
  "sp-runtime/std",
  "sp-api/std",
  "sp-std/std",
  "sp-io/std",
  "sp-core/std",
  "pallet-x3-kernel/std",
]
runtime-benchmarks = [
  "frame-benchmarking/runtime-benchmarks",
  "frame-support/runtime-benchmarks",
  "frame-system/runtime-benchmarks",
  "sp-runtime/runtime-benchmarks",
]
try-runtime = [
  "frame-support/try-runtime",
  "frame-system/try-runtime",
  "sp-runtime/try-runtime",
]