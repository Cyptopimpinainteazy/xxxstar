<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leaderboard — Blockchain TPS Test</title>
  <style>body{font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:#071024;color:#e8f1fb;padding:2rem}.card{max-width:1000px;margin:2rem auto;padding:2rem;border-radius:12px;background:rgba(255,255,255,.02)}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid rgba(255,255,255,.04);padding:.6rem;text-align:left}th{color:#79e0ff}</style>
</head>
<body>
  <div class="card">
    <h1>Leaderboard</h1>
    <p>Top improvements from our benchmark runs.</p>
    <table><thead><tr><th>Rank</th><th>Company ID</th><th>RPC</th><th>Baseline TPS</th><th>Our TPS</th><th>Improvement %</th><th>Time</th></tr></thead><tbody id="tbody"></tbody></table>
  </div>
<script>
  async function load() {
    const r = await fetch('/api/leaderboard');
    const j = await r.json();
    const t = document.getElementById('tbody');
    t.innerHTML = '';
    j.forEach((row, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${idx+1}</td><td>${row.company_id||'-'}</td><td>${row.rpc}</td><td>${Math.round(row.baseline)}</td><td>${Math.round(row.our)}</td><td>${row.improvement.toFixed(1)}%</td><td>${new Date(row.timestamp||0).toLocaleString()}</td>`;
      t.appendChild(tr);
    });
  }
  load(); setInterval(load, 5000);
</script>
</body>
</html>
