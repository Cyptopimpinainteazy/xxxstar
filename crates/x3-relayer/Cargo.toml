[package]
name = "x3-relayer"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "x3-relayer"
path = "src/main.rs"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
tokio-util = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
reqwest = { version = "0.11", features = ["json"] }
x3-finality-oracle = { path = "../x3-finality-oracle" }
x3-verification-router = { path = "../x3-verification-router" }
x3-validator-attestation = { path = "../x3-validator-attestation" }
x3-proof-dispute = { path = "../x3-proof-dispute" }
x3-gateway-risk-engine = { path = "../x3-gateway-risk-engine" }

[dev-dependencies]
tokio-test = "0.4"
