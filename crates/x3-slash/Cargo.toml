[package]
name = "x3-slash"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "X3 Slashing Engine — automatic, deterministic punishment for protocol violations"

[dependencies]
x3-proof = { path = "../x3-proof", default-features = false, optional = true }
serde = { workspace = true, features = ["derive", "alloc"] }
serde_json = { version = "1.0", default-features = false, features = ["alloc"], optional = true }
sha2 = { version = "0.10", default-features = false, optional = true }
thiserror = { version = "2.0", default-features = false }

[dev-dependencies]

[features]
default = ["std"]
std = [
    "dep:x3-proof",
    "x3-proof/std",
    "serde/std",
    "dep:serde_json",
    "dep:sha2",
]
