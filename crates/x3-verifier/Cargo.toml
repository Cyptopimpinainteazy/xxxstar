[package]
name = "x3-verifier"
version = "0.1.0"
edition = "2021"
description = "Static verifier for X3 contracts - gas bounds, forbidden ops, determinism checking"
license = "MIT"
repository = "https://github.com/x3-chain/x3-chain"

[dependencies]
x3-mir = { path = "../x3-mir" }
x3-common = { path = "../x3-common" }
x3-backend = { path = "../x3-backend" }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

[dev-dependencies]
x3-compiler = { path = "../x3-compiler" }
x3-parser = { path = "../x3-parser" }
x3-ast = { path = "../x3-ast" }
x3-hir = { path = "../x3-hir" }

[features]
default = []
fuzzer = []
