[package]
name = "x3-gulfstream"
version = "0.1.0"
edition = "2021"
description = "X3 Chain Gulf-stream - Transaction forwarding and propagation"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
blake3 = "1.5"
thiserror = "1.0"
anyhow = "1.0"
parking_lot = "0.12"
bytes = "1.5"
uuid = { version = "1.6", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
lru = "0.18"
futures = "0.3"
async-trait = "0.1"

[dev-dependencies]
tokio-test = "0.4"

[features]
default = ["std"]
std = []