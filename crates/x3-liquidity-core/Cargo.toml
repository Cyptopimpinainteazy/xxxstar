[package]
name = "x3-liquidity-core"
version = "0.1.0"
authors = ["X3 Chain Core Team <core@x3-chain.io>"]
description = "Thin v0.4 liquidity wrapper — exposes spot-AMM and settlement only from x3-dex. Advanced features (perps, options, flash loans, mining) are gated."
edition = "2021"
license = "Apache-2.0"
publish = false

[lib]
crate-type = ["rlib"]

[dependencies]
parity-scale-codec = { workspace = true, features = ["derive"] }
sp-std = { workspace = true, default-features = false }
sp-core = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }
x3-dex = { path = "../x3-dex", default-features = false }

[features]
default = ["std"]
std = [
    "parity-scale-codec/std",
    "sp-std/std",
    "sp-core/std",
    "sp-runtime/std",
    "x3-dex/std",
]
# Gate advanced DEX features; none are active by default in v0.4.
advanced = []
