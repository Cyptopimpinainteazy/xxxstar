[package]
name = "x3-swarm-core"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["X3 Team"]
description = "Core swarm orchestration primitives for X3 Atomic Star"
repository = "https://github.com/Cyptopimpinainteazy/X3_ATOMIC_STAR"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1.0", features = ["rt", "time"] }
async-trait = "0.1"
tracing = "0.1"