[package]
name = "x3-typeck"
version = "0.1.0"
edition = "2021"
description = "X3 Type System and Type Checker"
license = "MIT OR Apache-2.0"

[dependencies]
x3-ast = { path = "../x3-ast" }
x3-common = { path = "../x3-common" }
x3-semantics = { path = "../x3-semantics" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
x3-parser = { path = "../x3-parser" }
