[package]
name = "x3-sidecar"
version = "0.1.0"
edition = "2021"
description = "X3 Cross-VM Sidecar — monitors Solana/EVM chains and bridges events into X3"
license = "MIT"

[[bin]]
name = "x3-sidecar"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
log = "0.4"
env_logger = "0.11"
