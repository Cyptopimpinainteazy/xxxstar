[package]
name = "pallet-x3-slash"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[dependencies]
frame-support = { workspace = true }
frame-system = { workspace = true }
sp-runtime = { workspace = true }
sp-core = { workspace = true }
sp-std = { workspace = true }
sp-io = { workspace = true }
codec = { workspace = true, default-features = false, features = ["derive", "max-encoded-len"] }
scale-info = { workspace = true, default-features = false, features = ["derive"] }
log = { workspace = true }

# X3 crates
x3-slash = { path = "../../crates/x3-slash", default-features = false }
x3-proof = { path = "../../crates/x3-proof", default-features = false, optional = true }
x3-accounting-events = { path = "../../crates/x3-accounting-events", default-features = false }

# Staking integration
pallet-staking = { git = "https://github.com/paritytech/polkadot-sdk", branch = "stable2512", default-features = false }

# Benchmarking
frame-benchmarking = { workspace = true, optional = true }

[features]
default = ["std"]
std = [
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "sp-runtime/std",
    "sp-core/std",
    "sp-std/std",
    "sp-io/std",
    "codec/std",
    "scale-info/std",
    "log/std",
    "x3-slash/std",
    "x3-proof?/std",
    "x3-accounting-events/std",
    "pallet-staking/std",
    "pallet-balances/std",
]
runtime-benchmarks = [
    "frame-benchmarking",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "sp-runtime/runtime-benchmarks",
    "pallet-staking/runtime-benchmarks",
]
try-runtime = [
    "frame-support/try-runtime",
    "frame-system/try-runtime",
    "pallet-staking/try-runtime",
]

[dev-dependencies]
pallet-balances = { workspace = true }
