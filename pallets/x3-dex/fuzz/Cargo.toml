[package]
name = "pallet-x3-dex-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

# Exclude from root workspace to allow nightly fuzz builds
[workspace]

[dependencies]
libfuzzer-sys = "0.4"
parity-scale-codec = { version = "3", features = ["derive"] }
sp-core = { default-features = false, git = "https://github.com/paritytech/polkadot-sdk", tag = "polkadot-stable2603" }

[dependencies.pallet-x3-dex]
path = ".."

[dependencies.x3-dex]
path = "../../../crates/x3-dex"

[[bin]]
name = "fuzz_codec_parsing"
path = "fuzz_targets/fuzz_codec_parsing.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_add_liquidity"
path = "fuzz_targets/fuzz_add_liquidity.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_remove_liquidity"
path = "fuzz_targets/fuzz_remove_liquidity.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_swap"
path = "fuzz_targets/fuzz_swap.rs"
test = false
doc = false
bench = false