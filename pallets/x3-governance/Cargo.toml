[package]
name = "pallet-x3-governance"
version = "1.0.0"
edition = "2021"
description = "X3 On-chain Governance Module with Proposals, Voting, and Treasury"

[dependencies]
frame-support = { version = "4.0", default-features = false, features = ["runtime-benchmarks"] }
frame-system = { version = "4.0", default-features = false }
frame-executive = { version = "4.0", default-features = false }
sp-core = { version = "29.0", default-features = false, features = ["serde"] }
sp-io = { version = "30.0", default-features = false }
sp-runtime = { version = "33.0", default-features = false, features = ["serde"] }
sp-std = { version = "14.0", default-features = false }
codec = { package = "parity-scale-codec", version = "3.0", default-features = false, features = ["derive"] }
scale-info = { version = "2.5", default-features = false, features = ["derive"] }
serde = { version = "1.0", default-features = false, features = ["derive", "alloc"], optional = true }
log = { version = "0.4.20", default-features = false }

[dev-dependencies]
sp-io = { version = "30.0", features = ["std"] }

[features]
default = ["std"]
std = [
    "codec/std",
    "frame-support/std",
    "frame-system/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "sp-std/std",
    "serde/std",
    "log/std",
    "scale-info/std",
]
runtime-benchmarks = ["frame-support/runtime-benchmarks"]

[[test]]
name = "governance_integration"
path = "tests/integration_tests.rs"
