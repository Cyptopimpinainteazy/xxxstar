[package]
name = "pallet-x3-cross-vm-router"
version = "0.1.0"
authors = ["X3 Chain Core Team <core@x3-chain.io>"]
description = "X3 Universal Asset Kernel — cross-VM transfer router. Enforces state machine, replay protection, expiry, and king invariant across X3Native/X3Evm/X3Svm."
edition = "2021"
license = "Apache-2.0"
publish = false

[lib]
crate-type = ["rlib"]

[dependencies]
frame-support = { workspace = true, default-features = false }
frame-system = { workspace = true, default-features = false }
codec = { workspace = true, default-features = false, features = ["derive", "max-encoded-len"] }
scale-info = { workspace = true, default-features = false, features = ["derive"] }
sp-core = { workspace = true, default-features = false }
sp-io = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }
sp-api = { workspace = true, default-features = false }
serde = { workspace = true, optional = true, features = ["derive"] }

x3-asset-kernel-types = { path = "../../crates/x3-asset-kernel-types", default-features = false }
x3-packet-standard = { path = "../../crates/x3-packet-standard", default-features = false }
x3-ixl = { path = "../../crates/x3-ixl", default-features = false }
x3-liquidity-core = { path = "../../crates/x3-liquidity-core", optional = true, default-features = false }

[features]
default = ["std", "mainnet-rc1"]

# ── Mainnet RC-1 scope lock ────────────────────────────────────────────────
# Only the features listed here are active on the RC-1 network.
# Anything NOT in this list MUST remain disabled until explicitly audited and
# enabled by a separate governance vote + migration.
mainnet-rc1 = [
    "internal-ixl",
    "packet-standard",
    "liquidity-core",
    "kernel-invariants",
]

# Internal modules that form the RC-1 critical path.
internal-ixl    = []   # x3-ixl bundle execution (always on in mainnet-rc1)
packet-standard = []   # x3-packet-standard lifecycle (always on in mainnet-rc1)
liquidity-core  = []   # spot AMM + LP locks (always on in mainnet-rc1)
kernel-invariants = [] # supply-ledger invariant enforcement

# ── Gated — NOT active in mainnet-rc1 ─────────────────────────────────────
# These features MUST NOT be enabled by the mainnet-rc1 feature set.
# Each one requires a separate audit pass before activation.
external-gateway   = []  # External cross-chain bridge surface
parallel-executor  = []  # Non-deterministic parallel execution
appzone-factory    = []  # AppZone contract deployment
pq-experimental    = []  # Post-quantum crypto schemes
advanced-dex       = []  # Perps / options / flash loans
ai-optimizer       = []  # AI route optimizer (consensus path)
gpu-acceleration   = []  # GPU validator acceleration

std = [
    "frame-support/std",
    "frame-system/std",
    "codec/std",
    "scale-info/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "sp-std/std",
    "sp-api/std",
    "serde",
    "serde/std",
    "x3-asset-kernel-types/std",
    "x3-packet-standard/std",
    "x3-ixl/std",
    "x3-liquidity-core/std",
]
try-runtime = [
    "frame-support/try-runtime",
    "frame-system/try-runtime",
]
runtime-benchmarks = [
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
]

[dev-dependencies]
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-core = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
pallet-balances = { workspace = true, features = ["std"] }
pallet-x3-asset-registry = { path = "../x3-asset-registry" }
pallet-x3-supply-ledger = { path = "../x3-supply-ledger" }
